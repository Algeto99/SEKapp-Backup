<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Accesos y Gestión de Brechas - SMT SecApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            padding-top: 80px; /* Account for fixed header */
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
            color: #ffffff;
        }
        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 1.5rem;
            z-index: 50;
        }
        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .nav-link {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .nav-link:hover {
            color: #93c5fd;
            text-decoration: underline;
        }
        .user-greeting {
            font-size: 0.875rem;
            color: #9ca3af;
        }
        .user-name {
            color: #60a5fa;
            font-weight: bold;
        }
        .admin-badge {
            color: #a855f7;
            font-weight: bold;
        }
        .form-section {
            background-color: #2d3748;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-input {
            background-color: #4a5568;
            border: 1px solid #718096;
            color: #e2e8f0;
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
        }
        .signature-pad {
            border: 2px dashed #4a5568;
            border-radius: 0.375rem;
            cursor: crosshair;
            background-color: white;
        }
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            color: #e2e8f0;
            width: auto;
        }
        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .theme-toggle svg {
            width: 1.5rem;
            height: 1.5rem;
        }
        /* Light mode styles */
        body.light-mode {
            background-color: #f8f9fa;
            color: #343a40;
        }
        body.light-mode h1, body.light-mode h2, body.light-mode h3, body.light-mode h4, body.light-mode h5, body.light-mode h6 {
            color: #212529;
        }
        body.light-mode .header-nav {
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        body.light-mode .user-greeting {
            color: #4a5568;
        }
        body.light-mode .form-section {
            background-color: #ffffff;
            border-color: #e2e8f0;
        }
        body.light-mode .form-input {
            background-color: #e2e8f0;
            border-color: #cbd5e0;
            color: #2d3748;
        }
        body.light-mode .theme-toggle {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #374151;
        }
        body.light-mode .theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }
        /* Responsive design */
        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }
            .nav-links {
                gap: 1rem;
                font-size: 0.8rem;
            }
            body {
                padding-top: 120px;
            }
            .theme-toggle {
                top: 1rem;
                left: 1rem;
            }
        }
        @media (max-width: 640px) {
            body {
                padding-top: 140px;
            }
        }
    </style>
</head>
<body>
    <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
        <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="lightModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>

    <div class="header-nav">
        <div class="nav-content">
            <div class="user-greeting">
                Bienvenido, <span class="user-name">{{ name }}</span>
                {% if is_admin %}
                    <span class="admin-badge">(Admin)</span>
                {% endif %}
            </div>
            <div class="nav-links">
                <a href="{{ landing_service_url }}" class="nav-link">Inicio</a>
                <a href="{{ dashboard_service_url }}" class="nav-link">Dashboard</a>
                <a href="{{ viewer_service_url }}" class="nav-link">Reportes</a>
                <a href="{{ url_for('select_form') }}" class="nav-link">Seleccionar Formulario</a>
                <a href="{{ login_service_url }}/logout" class="nav-link">Cerrar Sesión</a>
            </div>
        </div>
    </div>

    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold">Planilla de Registro de Control de Acceso y Gestión de Brechas</h1>
        </header>

        <form id="controlAccesoForm" action="{{ url_for('submit_control_accesos') }}" method="POST" class="space-y-6">

            <div class="form-section">
                <h2 class="text-xl font-bold mb-4">1. Datos Generales</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="cliente_instalacion" class="block text-sm font-medium mb-1">Cliente / Instalación</label>
                        <input type="text" name="cliente_instalacion" id="cliente_instalacion" class="form-input">
                    </div>
                    <div>
                        <label for="puesto_area_especifica" class="block text-sm font-medium mb-1">Puesto o Área Específica</label>
                        <input type="text" name="puesto_area_especifica" id="puesto_area_especifica" class="form-input">
                    </div>
                    <div>
                        <label for="fecha_hora" class="block text-sm font-medium mb-1">Fecha y Hora</label>
                        <input type="datetime-local" name="fecha_hora" id="fecha_hora" class="form-input" required>
                    </div>
                    <div>
                        <label for="rol_aplicador" class="block text-sm font-medium mb-1">Rol del Aplicador/Responsable</label>
                        <select name="rol_aplicador" id="rol_aplicador" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Agente de seguridad</option>
                            <option>Supervisor/Inspector</option>
                            <option>Analista de Calidad</option>
                            <option>Jefe de Seguridad</option>
                            <option>Cliente</option>
                            <option>Locatario</option>
                        </select>
                    </div>
                    <div>
                        <label for="turno" class="block text-sm font-medium mb-1">Turno</label>
                        <select name="turno" id="turno" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Mañana</option>
                            <option>Tarde</option>
                            <option>Noche</option>
                            <option>24 Horas</option>
                        </select>
                    </div>
                    <div>
                        <label for="nombre_responsable" class="block text-sm font-medium mb-1">Nombre del Responsable</label>
                        <input type="text" name="nombre_responsable" id="nombre_responsable" class="form-input">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">Firma del Responsable</label>
                        <canvas id="signaturePadResponsable" class="signature-pad w-full h-48"></canvas>
                        <button type="button" id="clearSignatureResponsable" class="mt-2 text-sm text-blue-400 hover:text-blue-300">Limpiar Firma</button>
                        <input type="hidden" name="firma_responsable" id="firma_responsable">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 class="text-xl font-bold mb-4">2. Registro de Accesos</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="rol_del_usuario" class="block text-sm font-medium mb-1">Rol del Usuario</label>
                        <select name="rol_del_usuario" id="rol_del_usuario" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Empleado</option>
                            <option>Cliente</option>
                            <option>Visitante</option>
                            <option>Proveedor</option>
                            <option>Contratista</option>
                        </select>
                    </div>
                    <div>
                        <label for="accion" class="block text-sm font-medium mb-1">Acción</label>
                        <select name="accion" id="accion" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Entrada</option>
                            <option>Salida</option>
                            <option>Denegado</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label for="motivo_de_ingreso" class="block text-sm font-medium mb-1">Motivo de Ingreso</label>
                        <textarea name="motivo_de_ingreso" id="motivo_de_ingreso" rows="3" class="form-input"></textarea>
                    </div>
                    <div>
                        <label for="autorizacion" class="block text-sm font-medium mb-1">Autorización (Sí/No)</label>
                        <select name="autorizacion" id="autorizacion" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Sí</option>
                            <option>No</option>
                        </select>
                    </div>
                    <div>
                        <label for="brecha_detectada" class="block text-sm font-medium mb-1">Brecha Detectada</label>
                        <select name="brecha_detectada" id="brecha_detectada" class="form-input">
                            <option value="Ninguna">Ninguna</option>
                            <option value="Brechas por personas">Brechas por personas</option>
                            <option value="Brechas por procedimiento">Brechas por procedimiento</option>
                            <option value="Brechas por tecnología / equipos">Brechas por tecnología / equipos</option>
                            <option value="Brechas por seguridad física">Brechas por seguridad física</option>
                        </select>
                    </div>
                    <div>
                        <label for="evidencia" class="block text-sm font-medium mb-1">Evidencia (CCTV, reporte)</label>
                        <input type="text" name="evidencia" id="evidencia" class="form-input">
                    </div>
                    <div>
                        <label for="responsable_del_control" class="block text-sm font-medium mb-1">Responsable del Control</label>
                        <input type="text" name="responsable_del_control" id="responsable_del_control" class="form-input">
                    </div>
                    <div class="md:col-span-2">
                        <label for="observaciones" class="block text-sm font-medium mb-1">Observaciones</label>
                        <textarea name="observaciones" id="observaciones" rows="3" class="form-input"></textarea>
                    </div>
                </div>
            </div>

            <div id="seguimiento_brechas" class="form-section hidden">
                <h2 class="text-xl font-bold mb-4">3. Seguimiento de Brechas Detectadas</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div id="brecha_personas_container" class="hidden md:col-span-2">
                        <label for="brecha_por_personas" class="block text-sm font-medium mb-1">Detalle de Brecha (Personas)</label>
                        <select name="brecha_por_personas" id="brecha_por_personas" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Usuario sin carné o credencial vigente.</option>
                            <option>Visitante sin autorización previa.</option>
                            <option>Intento de ingreso con documento falso.</option>
                            <option>Ingreso sin registrarse en la bitácora.</option>
                            <option>Personal sin capacitación en protocolos de acceso.</option>
                        </select>
                    </div>
                    <div id="brecha_procedimiento_container" class="hidden md:col-span-2">
                        <label for="brecha_por_procedimiento" class="block text-sm font-medium mb-1">Detalle de Brecha (Procedimiento)</label>
                        <select name="brecha_por_procedimiento" id="brecha_por_procedimiento" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Puerta/torniquete dejado abierto.</option>
                            <option>Vehículo ingresa sin revisión.</option>
                            <option>Falta de verificación de objetos o paquetes.</option>
                            <option>No se registró placa de vehículo en el sistema.</option>
                            <option>Acceso sin pasar por detector de metales / escáner.</option>
                        </select>
                    </div>
                    <div id="brecha_tecnologia_container" class="hidden md:col-span-2">
                        <label for="brecha_por_tecnologia_equipos" class="block text-sm font-medium mb-1">Detalle de Brecha (Tecnología)</label>
                        <select name="brecha_por_tecnologia_equipos" id="brecha_por_tecnologia_equipos" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Lector biométrico fuera de servicio.</option>
                            <option>Cámara de CCTV sin grabación en el punto de acceso.</option>
                            <option>Tarjeta de proximidad clonada o dañada.</option>
                            <option>Alarma de puerta forzada desactivada.</option>
                        </select>
                    </div>
                    <div id="brecha_fisica_container" class="hidden md:col-span-2">
                        <label for="brecha_por_seguridad_fisica" class="block text-sm font-medium mb-1">Detalle de Brecha (Seguridad Física)</label>
                        <select name="brecha_por_seguridad_fisica" id="brecha_por_seguridad_fisica" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Portón quedó abierto más de X minutos.</option>
                            <option>Vidrio roto en puerta de acceso.</option>
                            <option>Candado ausente en acceso restringido.</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label for="accion_inmediata_tomada" class="block text-sm font-medium mb-1">Acción Inmediata Tomada</label>
                        <textarea name="accion_inmediata_tomada" id="accion_inmediata_tomada" rows="3" class="form-input"></textarea>
                    </div>
                    <div class="md:col-span-2">
                        <label for="accion_correctiva_recomendada" class="block text-sm font-medium mb-1">Acción Correctiva Recomendada</label>
                        <textarea name="accion_correctiva_recomendada" id="accion_correctiva_recomendada" rows="3" class="form-input"></textarea>
                    </div>
                    <div>
                        <label for="responsable_asignado" class="block text-sm font-medium mb-1">Responsable Asignado</label>
                        <input type="text" name="responsable_asignado" id="responsable_asignado" class="form-input">
                    </div>
                    <div>
                        <label for="fecha_limite_de_cierre" class="block text-sm font-medium mb-1">Fecha Límite de Cierre</label>
                        <input type="date" name="fecha_limite_de_cierre" id="fecha_limite_de_cierre" class="form-input">
                    </div>
                    <div>
                        <label for="estado" class="block text-sm font-medium mb-1">Estado</label>
                        <select name="estado" id="estado" class="form-input">
                            <option value="">Seleccione...</option>
                            <option>Pendiente</option>
                            <option>En proceso</option>
                            <option>Cerrado</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h2 class="text-xl font-bold mb-4">4. Firma de Cierre</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="nombre_cierre" class="block text-sm font-medium mb-1">Nombre de Quien Cierra</label>
                        <input type="text" name="nombre_cierre" id="nombre_cierre" class="form-input">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">Firma de Cierre</label>
                        <canvas id="signaturePadCierre" class="signature-pad w-full h-48"></canvas>
                        <button type="button" id="clearSignatureCierre" class="mt-2 text-sm text-blue-400 hover:text-blue-300">Limpiar Firma</button>
                        <input type="hidden" name="firma_cierre" id="firma_cierre">
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:shadow-outline transition duration-300">
                    Enviar Reporte
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        // Theme toggle elements
        const themeToggle = document.getElementById('themeToggle');
        const darkModeIcon = document.getElementById('darkModeIcon');
        const lightModeIcon = document.getElementById('lightModeIcon');

        // Theme management
        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
                setLightMode();
            } else {
                setDarkMode();
            }
        }

        function setDarkMode() {
            document.body.classList.remove('light-mode');
            darkModeIcon.style.display = 'block';
            lightModeIcon.style.display = 'none';
            localStorage.setItem('theme', 'dark');
        }

        function setLightMode() {
            document.body.classList.add('light-mode');
            darkModeIcon.style.display = 'none';
            lightModeIcon.style.display = 'block';
            localStorage.setItem('theme', 'light');
        }

        function toggleTheme() {
            if (document.body.classList.contains('light-mode')) {
                setDarkMode();
            } else {
                setLightMode();
            }
        }
        
        document.addEventListener('DOMContentLoaded', function () {
            initializeTheme();
            
            if (themeToggle) {
                themeToggle.addEventListener('click', toggleTheme);
            }
            // Signature Pad 1 (Responsable)
            const canvas1 = document.getElementById('signaturePadResponsable');
            const signaturePad1 = new SignaturePad(canvas1);
            const clearButton1 = document.getElementById('clearSignatureResponsable');
            const hiddenInput1 = document.getElementById('firma_responsable');

            // Signature Pad 2 (Cierre)
            const canvas2 = document.getElementById('signaturePadCierre');
            const signaturePad2 = new SignaturePad(canvas2);
            const clearButton2 = document.getElementById('clearSignatureCierre');
            const hiddenInput2 = document.getElementById('firma_cierre');

            clearButton1.addEventListener('click', () => {
                signaturePad1.clear();
            });

            clearButton2.addEventListener('click', () => {
                signaturePad2.clear();
            });

            const form = document.getElementById('controlAccesoForm');
            form.addEventListener('submit', (event) => {
                if (!signaturePad1.isEmpty()) {
                    hiddenInput1.value = signaturePad1.toDataURL();
                }
                if (!signaturePad2.isEmpty()) {
                    hiddenInput2.value = signaturePad2.toDataURL();
                }
            });

            // Conditional Fields Logic
            const brechaDetectadaSelect = document.getElementById('brecha_detectada');
            const seguimientoBrechasFieldset = document.getElementById('seguimiento_brechas');
            
            const brechaContainers = {
                'Brechas por personas': document.getElementById('brecha_personas_container'),
                'Brechas por procedimiento': document.getElementById('brecha_procedimiento_container'),
                'Brechas por tecnología / equipos': document.getElementById('brecha_tecnologia_container'),
                'Brechas por seguridad física': document.getElementById('brecha_fisica_container')
            };

            brechaDetectadaSelect.addEventListener('change', function () {
                const selectedValue = this.value;

                Object.values(brechaContainers).forEach(container => {
                    if (container) container.classList.add('hidden');
                });

                if (selectedValue !== 'Ninguna') {
                    seguimientoBrechasFieldset.classList.remove('hidden');
                    if (brechaContainers[selectedValue]) {
                        brechaContainers[selectedValue].classList.remove('hidden');
                    }
                } else {
                    seguimientoBrechasFieldset.classList.add('hidden');
                }
            });
            brechaDetectadaSelect.dispatchEvent(new Event('change'));
        });
    </script>
</body>
</html>
