<!DOCTYPE html>
<html lang="es" class="transition duration-300 ease-in-out">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Merriweather', serif;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-8">
  <div class="w-full max-w-md bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 sm:p-8 text-center">
    <h1 class="text-2xl font-bold mb-4">Error</h1>
    <p class="text-red-500 mb-4">{{ message }}</p>
    <a href="{{ login_service_url }}/login" class="text-blue-600 dark:text-blue-300 hover:underline">Volver al inicio de sesión</a>
  </div>
</body>
</html>
