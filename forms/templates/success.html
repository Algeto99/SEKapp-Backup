<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envío Exitoso - SMT SecApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
            color: #ffffff;
        }
        .success-card {
            background-color: #2d3748;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 450px;
            width: 100%;
            padding: 2.5rem;
        }
        .success-button {
            @apply inline-block py-4 px-8 text-lg font-medium rounded-lg
                    transition-all duration-200 ease-in-out cursor-pointer shadow-xl
                    hover:scale-105 bg-blue-600 text-white hover:bg-blue-700
                    focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50;
        }
        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            color: #e2e8f0;
        }
        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .theme-toggle svg {
            width: 1.5rem;
            height: 1.5rem;
        }
        
        /* Light mode styles */
        body.light-mode {
            background-color: #f8f9fa;
            color: #343a40;
        }
        
        body.light-mode h1, 
        body.light-mode h2, 
        body.light-mode h3, 
        body.light-mode h4, 
        body.light-mode h5, 
        body.light-mode h6 {
            color: #212529;
        }
        
        body.light-mode .success-card {
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        body.light-mode .theme-toggle {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #374151;
        }
        
        body.light-mode .theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
        <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="lightModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>

    <div class="success-card text-center">
        <img src="https://storage.googleapis.com/smt-misc/SMT-logo.png" alt="SMT Logo" class="mx-auto mb-6 w-28 opacity-90" />
        
        <div class="mb-6">
            <div class="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-bold text-green-400 mb-4">¡Éxito!</h1>
        </div>
        
        <div class="bg-green-500 bg-opacity-20 border border-green-500 border-opacity-30 rounded-lg p-4 mb-6">
            <p class="text-lg font-medium">{{ message }}</p>
        </div>
        
        <div class="space-y-3">
            <a href="/" class="success-button block text-center">
                Crear Nuevo Reporte
            </a>
            <a href="{{ login_service_url }}/logout" class="block text-blue-400 hover:underline">
                Cerrar Sesión
            </a>
        </div>
    </div>

    <script>
        // Theme toggle elements
        const themeToggle = document.getElementById('themeToggle');
        const darkModeIcon = document.getElementById('darkModeIcon');
        const lightModeIcon = document.getElementById('lightModeIcon');

        // Theme management
        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
                setLightMode();
            } else {
                setDarkMode();
            }
        }

        function setDarkMode() {
            document.body.classList.remove('light-mode');
            darkModeIcon.style.display = 'block';
            lightModeIcon.style.display = 'none';
            localStorage.setItem('theme', 'dark');
        }

        function setLightMode() {
            document.body.classList.add('light-mode');
            darkModeIcon.style.display = 'none';
            lightModeIcon.style.display = 'block';
            localStorage.setItem('theme', 'light');
        }

        function toggleTheme() {
            if (document.body.classList.contains('light-mode')) {
                setDarkMode();
            } else {
                setLightMode();
            }
        }

        // Initialize theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeTheme();
            
            if (themeToggle) {
                themeToggle.addEventListener('click', toggleTheme);
            }
        });
    </script>
</body>
</html>
