<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Mantenimiento - SMT SecApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            padding-top: 80px;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Merriweather', serif;
            color: #ffffff;
        }

        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 1.5rem;
            z-index: 50;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        .user-greeting {
            font-size: 0.875rem;
            color: #9ca3af;
        }

        .user-name {
            color: #60a5fa;
            font-weight: bold;
        }

        .admin-badge {
            color: #a855f7;
            font-weight: bold;
        }

        .form-section {
            background-color: #2d3748;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-input,
        .form-select {
            background-color: #4a5568;
            border: 1px solid #718096;
            color: #e2e8f0;
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.2s ease;
        }

        .form-input[type="file"]::-webkit-file-upload-button {
            filter: invert(1);
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
        }

        .signature-pad {
            border: 2px dashed #4a5568;
            border-radius: 0.375rem;
            cursor: crosshair;
            background-color: white;
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            color: #e2e8f0;
            width: auto;
        }

        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        body.light-mode {
            background-color: #f8f9fa;
            color: #343a40;
        }

        body.light-mode h1,
        body.light-mode h2,
        body.light-mode h3,
        body.light-mode h4,
        body.light-mode h5,
        body.light-mode h6 {
            color: #212529;
        }

        body.light-mode .header-nav {
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        body.light-mode .user-greeting {
            color: #4a5568;
        }

        body.light-mode .form-section {
            background-color: #ffffff;
            border-color: #e2e8f0;
        }

        body.light-mode .form-input,
        body.light-mode .form-select {
            background-color: #e9ecef;
            border-color: #ced4da;
            color: #212529;
        }

        body.light-mode .form-input[type="file"]::-webkit-file-upload-button {
            filter: none;
        }

        body.light-mode .theme-toggle {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #374151;
        }

        body.light-mode .theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            body {
                padding-top: 120px;
            }
        }

        @media (max-width: 640px) {
            body {
                padding-top: 140px;
            }
        }
    </style>
</head>

<body>
    <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
        <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="lightModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>
    <div class="header-nav">
        <div class="nav-content">
            <div class="user-greeting">
                Bienvenido, <span class="user-name">{{ name }}</span>
                {% if is_admin %}
                <span class="admin-badge">(Admin)</span>
                {% endif %}
            </div>
            <div class="nav-links">
                <a href="{{ landing_service_url }}" class="nav-link">Inicio</a>
                {% if is_admin %}
                <a href="{{ dashboard_service_url }}" class="nav-link">Dashboard</a>
                <a href="{{ viewer_service_url }}" class="nav-link">Reportes</a>
                {% endif %}
                <a href="{{ url_for('select_form') }}" class="nav-link">Seleccionar Formulario</a>
                <a href="{{ login_service_url }}/logout" class="nav-link">Cerrar Sesión</a>
            </div>
        </div>
    </div>

    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold">Control de Mantenimiento a Equipos de Seguridad</h1>
        </header>

        <form id="mantenimientoForm" action="{{ url_for('submit_orden_mantenimiento') }}" method="POST"
            enctype="multipart/form-data" class="space-y-6">

            <div class="form-section">
                <h2 class="text-xl font-bold mb-4">1. Datos Generales</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="cliente_instalacion" class="block text-sm font-medium mb-1">Cliente /
                            Instalación</label>
                        <input type="text" name="cliente_instalacion" id="cliente_instalacion" class="form-input"
                            required>
                    </div>
                    <div>
                        <label for="fecha_hora" class="block text-sm font-medium mb-1">Fecha y Hora</label>
                        <input type="datetime-local" name="fecha_hora" id="fecha_hora" class="form-input" required>
                    </div>
                    <div>
                        <label for="rol_aplicador" class="block text-sm font-medium mb-1">Rol del
                            Aplicador/Responsable</label>
                        <select name="rol_aplicador" id="rol_aplicador" class="form-select">
                            <option value="">Seleccione...</option>
                            <option>Técnico CCTV</option>
                            <option>Contratista</option>
                        </select>
                    </div>
                    <div>
                        <label for="nombre_tecnico" class="block text-sm font-medium mb-1">Nombre Técnico</label>
                        <input type="text" name="nombre_tecnico" id="nombre_tecnico" class="form-input" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">Firma Técnico</label>
                        <canvas id="signaturePadTecnico" class="signature-pad w-full h-48"></canvas>
                        <button type="button" id="clearSignatureTecnico"
                            class="mt-2 text-sm text-blue-400 hover:text-blue-300">Limpiar Firma</button>
                        <input type="hidden" name="firma_tecnico" id="firma_tecnico">
                    </div>
                </div>
            </div>

            <div id="mantenimientosContainer"></div>

            <div class="flex justify-between pt-4">
                <button type="button" id="addMantenimientoBtn"
                    class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:shadow-outline transition duration-300">
                    + Añadir otro mantenimiento
                </button>

                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:shadow-outline transition duration-300">
                    Enviar Orden de Mantenimiento
                </button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Theme toggle functionality
            const themeToggle = document.getElementById('themeToggle');
            const darkModeIcon = document.getElementById('darkModeIcon');
            const lightModeIcon = document.getElementById('lightModeIcon');

            function setDarkMode() {
                document.body.classList.remove('light-mode');
                darkModeIcon.style.display = 'block';
                lightModeIcon.style.display = 'none';
                localStorage.setItem('theme', 'dark');
            }

            function setLightMode() {
                document.body.classList.add('light-mode');
                darkModeIcon.style.display = 'none';
                lightModeIcon.style.display = 'block';
                localStorage.setItem('theme', 'light');
            }

            function toggleTheme() {
                if (document.body.classList.contains('light-mode')) {
                    setDarkMode();
                } else {
                    setLightMode();
                }
            }

            // Initialize theme on page load
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
                setLightMode();
            } else {
                setDarkMode();
            }
            if (themeToggle) {
                themeToggle.addEventListener('click', toggleTheme);
            }

            // Set current date and time
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('fecha_hora').value = now.toISOString().slice(0, 16);

            // --- MANTENIMIENTO BLOCK LOGIC ---
            let mantenimientoCount = 0;
            const container = document.getElementById('mantenimientosContainer');
            const addBtn = document.getElementById('addMantenimientoBtn');

            function createMantenimientoBlock(index) {
                const div = document.createElement('div');
                div.className = 'form-section mantenimiento-block border-l-4 border-blue-500 pl-4 bg-gray-800 bg-opacity-50 mt-8';
                div.dataset.index = index;

                div.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-blue-400">Mantenimiento #${index + 1}</h2>
                        ${index > 0 ? `<button type="button" class="text-red-400 hover:text-red-300 remove-mantenimiento" onclick="removeMantenimiento(${index})">Eliminar</button>` : ''}
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-medium mb-1">Puesto o Área Específica</label>
                            <input type="text" name="mantenimientos[${index}][puesto_area_especifica]" class="form-input" required>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-1">Equipo</label>
                            <select name="mantenimientos[${index}][equipo]" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option>CCTV</option>
                                <option>Torniquete</option>
                                <option>Radio</option>
                                <option>UPS</option>
                                <option>Panel de alarma</option>
                                <option>Botón de pánico</option>
                                <option>Control de acceso</option>
                                <option>Detección de incendios</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-1">ID Equipo / Serial</label>
                            <input type="text" name="mantenimientos[${index}][id_equipo_serial]" class="form-input">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-1">Tipo de Servicio</label>
                            <select name="mantenimientos[${index}][tipo_servicio]" class="form-select" required>
                                <option value="">Seleccione...</option>
                                <option>Preventivo</option>
                                <option>Correctivo</option>
                                <option>Predictivo</option>
                            </select>
                        </div>

                         <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1">Actividad Realizada</label>
                            <textarea name="mantenimientos[${index}][actividad_realizada]" rows="3" class="form-input" required></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-1">Downtime (horas)</label>
                            <input type="number" step="0.01" name="mantenimientos[${index}][downtime_horas]" class="form-input" placeholder="0.00">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-1">Repuestos usados</label>
                            <select name="mantenimientos[${index}][repuestos_usados]" class="form-select">
                                <option value="">Seleccione...</option>
                                <option value="true">Sí</option>
                                <option value="false">No</option>
                            </select>
                        </div>

                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1">Foto/Evidencia</label>
                            <input type="file" name="mantenimientos[${index}][foto_evidencia]" class="form-input" accept="image/*,application/pdf">
                            <p class="text-xs text-gray-400 mt-1">Sube una foto o PDF del mantenimiento.</p>
                        </div>
                    </div>
                `;
                return div;
            }

            function addMantenimiento() {
                const index = mantenimientoCount++;
                const block = createMantenimientoBlock(index);
                container.appendChild(block);
            }

            // Global Technician Signature
            const canvasTecnico = document.getElementById('signaturePadTecnico');
            const padTecnico = new SignaturePad(canvasTecnico, { backgroundColor: 'white' });

            function resizeCanvas() {
                const ratio = Math.max(window.devicePixelRatio || 1, 1);
                canvasTecnico.width = canvasTecnico.offsetWidth * ratio;
                canvasTecnico.height = canvasTecnico.offsetHeight * ratio;
                canvasTecnico.getContext("2d").scale(ratio, ratio);
                padTecnico.clear();
            }
            window.addEventListener("resize", resizeCanvas);
            resizeCanvas();

            document.getElementById('clearSignatureTecnico').addEventListener('click', () => {
                padTecnico.clear();
            });

            // Init first block
            addMantenimiento();

            // Add Listener
            addBtn.addEventListener('click', addMantenimiento);

            // Remove handler
            window.removeMantenimiento = function (index) {
                const block = document.querySelector(`.mantenimiento-block[data-index="${index}"]`);
                if (block) {
                    block.remove();
                }
            };

            // Submit Handler
            const form = document.getElementById('mantenimientoForm');
            form.addEventListener('submit', (event) => {
                if (!padTecnico.isEmpty()) {
                    document.getElementById('firma_tecnico').value = padTecnico.toDataURL();
                }
            });
        });
    </script>
</body>

</html>
