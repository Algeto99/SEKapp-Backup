<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Incidencia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-green-100 to-blue-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-2xl max-w-2xl w-full transform transition-all duration-300 hover:scale-105">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Reporte de Incidencia</h1>

        <form action="/submit_report" method="POST" class="space-y-6">
            <div>
                <label for="tipo_incidencia" class="block text-sm font-medium text-gray-700 mb-1">Tipo de Incidencia:</label>
                <select id="tipo_incidencia" name="tipo_incidencia" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">Seleccione un tipo</option>
                    {% for tipo in tipos_incidencia %}
                        <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="tipo_cliente" class="block text-sm font-medium text-gray-700 mb-1">Tipo de Cliente:</label>
                <select id="tipo_cliente" name="tipo_cliente" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">Seleccione un tipo</option>
                    {% for tipo in tipos_cliente %}
                        <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="lugar_incidente" class="block text-sm font-medium text-gray-700 mb-1">Lugar del Incidente:</label>
                <select id="lugar_incidente" name="lugar_incidente" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">Seleccione un lugar</option>
                    {% for lugar in lugares_incidente %}
                        <option value="{{ lugar.id }}">{{ lugar.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <div>
                <label for="descripcion_zona_comun" class="block text-sm font-medium text-gray-700 mb-1">Si la incidencia fue en una zona común del C.C. descríbala aquí:</label>
                <textarea id="descripcion_zona_comun" name="descripcion_zona_comun" rows="3"
                          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
            </div>

            <div>
                <label for="fecha_incidente" class="block text-sm font-medium text-gray-700 mb-1">Fecha:</label>
                <input type="date" id="fecha_incidente" name="fecha_incidente" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="hora_incidente" class="block text-sm font-medium text-gray-700 mb-1">Hora:</label>
                <input type="time" id="hora_incidente" name="hora_incidente" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="descripcion_incidente" class="block text-sm font-medium text-gray-700 mb-1">Descripción del Incidente:</label>
                <textarea id="descripcion_incidente" name="descripcion_incidente" rows="4" required
                          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
            </div>

            <div>
                <label for="valor_aproximado" class="block text-sm font-medium text-gray-700 mb-1">Valor Aproximado:</label>
                <input type="number" step="0.01" id="valor_aproximado" name="valor_aproximado"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="pertenencias_sustraidas" class="block text-sm font-medium text-gray-700 mb-1">Pertenencias Sustraídas:</label>
                <textarea id="pertenencias_sustraidas" name="pertenencias_sustraidas" rows="3"
                          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
            </div>

            <div>
                <label for="nombre_persona" class="block text-sm font-medium text-gray-700 mb-1">Nombre de la Persona:</label>
                <input type="text" id="nombre_persona" name="nombre_persona" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="telefono_persona" class="block text-sm font-medium text-gray-700 mb-1">Teléfono:</label>
                <input type="tel" id="telefono_persona" name="telefono_persona"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="numero_identidad_persona" class="block text-sm font-medium text-gray-700 mb-1">Número de Identidad:</label>
                <input type="text" id="numero_identidad_persona" name="numero_identidad_persona"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="numero_local" class="block text-sm font-medium text-gray-700 mb-1">Número de Local:</label>
                <input type="text" id="numero_local" name="numero_local"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="direccion" class="block text-sm font-medium text-gray-700 mb-1">Dirección:</label>
                <input type="text" id="direccion" name="direccion"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="imagenes_pdfs" class="block text-sm font-medium text-gray-700 mb-1">Imágenes y PDFs (Rutas de archivos o URLs):</label>
                <input type="text" id="imagenes_pdfs" name="imagenes_pdfs"
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div>
                <label for="supervisor" class="block text-sm font-medium text-gray-700 mb-1">Supervisor:</label>
                <select id="supervisor" name="supervisor" required
                        class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
                    <option value="">Seleccione un supervisor</option>
                    {% for sup in supervisores %}
                        <option value="{{ sup.id }}">{{ sup.nombre }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit"
                    class="w-full py-3 px-6 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75 transition duration-200 ease-in-out transform hover:-translate-y-1">
                Enviar Reporte
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/" class="text-blue-600 hover:underline text-sm">Volver al Inicio</a>
        </div>
    </div>
</body>
</html>
