<!DOCTYPE html>
<html lang="es" class="transition duration-300 ease-in-out">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reporte de Incidencia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Merriweather', serif;
    }
    /* Flashed message styling */
    .flash-message {
        @apply p-3 mb-4 rounded-lg text-sm font-medium;
    }
    .flash-success { @apply bg-green-500 text-white; }
    .flash-error { @apply bg-red-500 text-white; }
    .flash-warning { @apply bg-yellow-500 text-gray-900; }
    .flash-info { @apply bg-blue-500 text-white; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-8">
  <div class="w-full max-w-2xl bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 sm:p-8">
    <div class="flex justify-between items-center mb-4">
      {% if name %}
        <div class="flex items-center space-x-4">
          <span class="text-sm text-gray-600 dark:text-gray-300">Bienvenido, <strong class="font-medium">{{ name }}</strong></span>
<!--      <a href="{{ dashboard_service_url }}" class="text-blue-600 dark:text-blue-300 hover:underline text-sm">Dashboard</a> -->
          <a href="{{ login_service_url }}/logout" class="text-blue-600 dark:text-blue-300 hover:underline text-sm">Cerrar Sesión</a>
        </div>
      {% endif %}

      <label class="flex items-center space-x-2 cursor-pointer ml-auto"> {# ml-auto pushes it to the right #}
        <input type="checkbox" id="theme-toggle" class="hidden">
        <div class="w-10 h-5 bg-gray-300 dark:bg-gray-700 rounded-full relative transition duration-300 ease-in-out">
          <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow-md transform transition duration-300 ease-in-out" id="theme-toggle-thumb"></div>
        </div>
        <span id="theme-label" class="text-sm text-gray-600 dark:text-gray-300">Dark Mode</span>
      </label>
    </div>

    <h1 class="text-3xl font-bold text-center mb-6">Reporte de Incidencia</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-4">
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form action="/submit_report" method="POST" class="space-y-6">
      <div>
        <label for="tipo_incidencia" class="block text-sm font-medium mb-1">Tipo de Incidencia:</label>
        <select id="tipo_incidencia" name="tipo_incidencia" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
          <option value="">Seleccione un tipo</option>
          {% for tipo in tipo_incidencia %}
            <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="tipo_cliente" class="block text-sm font-medium mb-1">Tipo de Cliente:</label>
        <select id="tipo_cliente" name="tipo_cliente" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
          <option value="">Seleccione un tipo</option>
          {% for tipo in tipo_cliente %}
            <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="lugar_incidente" class="block text-sm font-medium mb-1">Lugar del Incidente:</label>
        <select id="lugar_incidente" name="lugar_incidente" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
          <option value="">Seleccione un lugar</option>
          {% for lugar in lugar_incidente %}
            <option value="{{ lugar.id }}">{{ lugar.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label for="descripcion_zona_comun" class="block text-sm font-medium mb-1">Si la incidencia fue en una zona común del C.C. descríbala aquí:</label>
        <textarea id="descripcion_zona_comun" name="descripcion_zona_comun" rows="3" class="w-full px-4 py-3 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900"></textarea>
      </div>

      <div>
        <label for="fecha_incidente" class="block text-sm font-medium mb-1">Fecha:</label>
        <input type="date" id="fecha_incidente" name="fecha_incidente" required class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="hora_incidente" class="block text-sm font-medium mb-1">Hora:</label>
        <input type="time" id="hora_incidente" name="hora_incidente" required class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="descripcion_incidente" class="block text-sm font-medium mb-1">Descripción del Incidente:</label>
        <textarea id="descripcion_incidente" name="descripcion_incidente" rows="4" required class="w-full px-4 py-3 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900"></textarea>
      </div>

      <div>
        <label for="valor_aproximado" class="block text-sm font-medium mb-1">Valor Aproximado:</label>
        <input type="number" step="0.01" id="valor_aproximado" name="valor_aproximado" class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="pertenencias_sustraidas" class="block text-sm font-medium mb-1">Pertenencias Sustraídas:</label>
        <textarea id="pertenencias_sustraidas" name="pertenencias_sustraidas" rows="3" class="w-full px-4 py-3 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900"></textarea>
      </div>

      <div>
        <label for="nombre_persona" class="block text-sm font-medium mb-1">Nombre de la Persona:</label>
        <input type="text" id="nombre_persona" name="nombre_persona" required class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="telefono_persona" class="block text-sm font-medium mb-1">Teléfono:</label>
        <input type="tel" id="telefono_persona" name="telefono_persona" class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="numero_identidad_persona" class="block text-sm font-medium mb-1">Número de Identidad:</label>
        <input type="text" id="numero_identidad_persona" name="numero_identidad_persona" class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="numero_local" class="block text-sm font-medium mb-1">Número de Local:</label>
        <input type="text" id="numero_local" name="numero_local" class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="direccion" class="block text-sm font-medium mb-1">Dirección:</label>
        <input type="text" id="direccion" name="direccion" class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="imagenes_pdfs" class="block text-sm font-medium mb-1">Imágenes y PDFs (Rutas de archivos o URLs):</label>
        <input type="text" id="imagenes_pdfs" name="imagenes_pdfs" class="w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
      </div>

      <div>
        <label for="supervisor" class="block text-sm font-medium mb-1">Supervisor:</label>
        <select id="supervisor" name="supervisor" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900">
          <option value="">Seleccione un supervisor</option>
          {% for sup in supervisor %}
            <option value="{{ sup.id }}">{{ sup.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <button type="submit" class="w-full py-3 px-6 bg-blue-600 text-white font-semibold rounded-lg shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75 transition duration-200 ease-in-out transform hover:scale-105">
        Enviar Reporte
      </button>
    </form>

    <div class="mt-6 text-center">
      </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script>
    document.querySelectorAll('.tom-select-searchable').forEach(el => {
      new TomSelect(el, { create: false });
    });

    const toggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const label = document.getElementById('theme-label');

    function setTheme(mode) {
      if (mode === 'dark') {
        html.classList.add('dark');
        toggle.checked = true;
        label.textContent = 'Light Mode';
      } else {
        html.classList.remove('dark');
        toggle.checked = false;
        label.textContent = 'Dark Mode';
      }
      localStorage.setItem('theme', mode);
    }

    toggle.addEventListener('change', () => {
      setTheme(toggle.checked ? 'dark' : 'light');
    });

    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      setTheme('dark');
    } else {
      setTheme('light');
    }
  </script>
</body>
</html>
