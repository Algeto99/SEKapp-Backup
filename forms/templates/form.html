<!DOCTYPE html>
<html lang="es" class="transition duration-300 ease-in-out">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reporte de Incidencia</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet" />

  <script>
    tailwind.config = {
      darkMode: 'class',
    };
  </script>
  <style>
    body {
      font-family: 'Roboto', sans-serif;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Merriweather', serif;
    }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex items-center justify-center p-4 sm:p-6 md:p-8">
  <div class="w-full max-w-2xl bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 sm:p-8">
    <!-- Theme Toggle -->
    <div class="flex justify-end mb-4">
      <label class="flex items-center space-x-2 cursor-pointer">
        <input type="checkbox" id="theme-toggle" class="hidden">
        <div class="w-10 h-5 bg-gray-300 dark:bg-gray-700 rounded-full relative transition duration-300 ease-in-out">
          <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow-md transform transition duration-300 ease-in-out" id="theme-toggle-thumb"></div>
        </div>
        <span class="text-sm text-gray-600 dark:text-gray-300">Dark Mode</span>
      </label>
    </div>

    <h1 class="text-3xl font-bold text-center mb-6">Reporte de Incidencia</h1>

    <form action="/submit_report" method="POST" class="space-y-6">

      <!-- Tipo de Incidencia -->
      <div>
        <label for="tipo_incidencia" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tipo de Incidencia:</label>
        <select id="tipo_incidencia" name="tipo_incidencia" required class="tom-select-searchable w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          <option value="">Seleccione un tipo</option>
          {% for tipo in tipo_incidencia %}
            <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Tipo de Cliente -->
      <div>
        <label for="tipo_cliente" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Tipo de Cliente:</label>
        <select id="tipo_cliente" name="tipo_cliente" required class="tom-select-searchable w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          <option value="">Seleccione un tipo</option>
          {% for tipo in tipo_cliente %}
            <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Lugar del Incidente -->
      <div>
        <label for="lugar_incidente" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Lugar del Incidente:</label>
        <select id="lugar_incidente" name="lugar_incidente" required class="tom-select-searchable w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          <option value="">Seleccione un lugar</option>
          {% for lugar in lugar_incidente %}
            <option value="{{ lugar.id }}">{{ lugar.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Remaining fields (input, textarea) -->
      <div>
        <label for="descripcion_incidente" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Descripción del Incidente:</label>
        <textarea id="descripcion_incidente" name="descripcion_incidente" rows="4" required class="w-full px-4 py-3 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900 placeholder-gray-500 focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
      </div>

      <!-- Repeat the above pattern for other fields like fecha, hora, nombre_persona, etc. -->
      <!-- Example: Fecha -->
      <div>
        <label for="fecha_incidente" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Fecha:</label>
        <input type="date" id="fecha_incidente" name="fecha_incidente" required class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
      </div>

      <!-- Supervisor -->
      <div>
        <label for="supervisor" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Supervisor:</label>
        <select id="supervisor" name="supervisor" required class="tom-select-searchable w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900 focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          <option value="">Seleccione un supervisor</option>
          {% for sup in supervisor %}
            <option value="{{ sup.id }}">{{ sup.nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="w-full py-3 px-6 bg-blue-600 text-white font-semibold rounded-lg shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75 transition duration-200 ease-in-out transform hover:scale-105">
        Enviar Reporte
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="/" class="text-blue-600 dark:text-blue-300 hover:underline text-sm">Volver al Inicio</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
  <script>
    document.querySelectorAll('.tom-select-searchable').forEach(el => {
      new TomSelect(el, { create: false });
    });

    // Theme toggle logic
    const toggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function setTheme(mode) {
      if (mode === 'dark') {
        html.classList.add('dark');
        toggle.checked = true;
      } else {
        html.classList.remove('dark');
        toggle.checked = false;
      }
      localStorage.setItem('theme', mode);
    }

    toggle.addEventListener('change', () => {
      setTheme(toggle.checked ? 'dark' : 'light');
    });

    const saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      setTheme('dark');
    } else {
      setTheme('light');
    }
  </script>
</body>
</html>
