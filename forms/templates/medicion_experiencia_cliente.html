<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medición de Experiencia del Cliente - SMT SecApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            min-height: 100vh;
            padding: 1.5rem;
            margin: 0;
            line-height: 1.6;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
            color: #ffffff;
            margin: 0 0 1rem 0;
        }
        
        h1 { font-size: 1.875rem; font-weight: 700; }
        h2 { font-size: 1.5rem; font-weight: 600; }
        
        .form-container {
            background-color: #2d3748;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem;
        }
        
        .logo {
            width: 80px !important;
            height: auto;
            opacity: 0.9;
            margin: 0 auto 1.5rem auto;
            display: block;
        }
        
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.25rem;
            color: #e2e8f0;
        }
        
        input, textarea, select {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #e5e7eb;
            border-radius: 0.75rem;
            background-color: #ffffff !important;
            color: #111827 !important;
            font-size: 1.125rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
            min-height: 3rem;
            transition: all 0.2s ease;
        }
        
        textarea {
            min-height: 4.5rem;
            resize: vertical;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }
        
        .submit-button {
            width: 100%;
            padding: 1.25rem 2rem;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 0.875rem;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 2rem;
        }
        
        fieldset {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            background-color: rgba(255, 255, 255, 0.02);
        }
        
        legend {
            font-size: 1.125rem;
            font-weight: 600;
            color: #60a5fa;
            padding: 0 0.5rem;
        }
        
        .grid {
            display: grid;
            gap: 1.5rem;
        }
        
        .grid-cols-1 { grid-template-columns: 1fr; }
        
        @media (min-width: 768px) {
            .md\\:grid-cols-2 { grid-template-columns: 1fr 1fr; }
            .md\\:col-span-2 { grid-column: span 2; }
        }
        
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .nav-links { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
        .nav-link { color: #60a5fa; text-decoration: none; font-size: 0.875rem; transition: all 0.2s; }
        .nav-link:hover { color: #93c5fd; text-decoration: underline; }
        
        .signature-container {
            border: 2px dashed #4a5568;
            border-radius: 0.75rem;
            margin-bottom: 1rem;
            background-color: #ffffff;
            cursor: crosshair;
            touch-action: none;
            position: relative;
        }
        .signature-pad {
            width: 100%;
            height: 200px;
            display: block;
        }
        .clear-button {
            padding: 0.5rem 1rem;
            background-color: #4a5568;
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 1rem;
        }
        .clear-button:hover { background-color: #718096; }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="header-nav">
            <div class="nav-links">
                {% if name %}
                <span style="color: #9ca3af;">Bienvenido, <strong style="color: #60a5fa;">{{ name }}</strong></span>
                {% endif %}
                <a href="/select" class="nav-link">Acceso a Formularios</a>
                <a href="{{ login_service_url }}/logout" class="nav-link">Cerrar Sesión</a>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="https://storage.googleapis.com/smt-misc/SMT-logo.png" alt="SMT Logo" class="logo" />
            <h1 style="margin-bottom: 1rem;">Medición de Experiencia del Cliente</h1>
            <p style="color: #9ca3af;">Seguridad Física</p>
        </div>

        <form id="experienciaForm" action="{{ url_for('submit_medicion_experiencia_cliente') }}" method="POST">
            <fieldset>
                <legend>1. Datos Generales</legend>
                <div class="grid md:grid-cols-2">
                    <div>
                        <label for="cliente_instalacion">Cliente / Instalación</label>
                        <input type="text" name="cliente_instalacion" id="cliente_instalacion" required>
                    </div>
                    <div>
                        <label for="puesto_area">Puesto o Área Específica</label>
                        <input type="text" name="puesto_area" id="puesto_area">
                    </div>
                    <div>
                        <label for="fecha_hora">Fecha y Hora</label>
                        <input type="datetime-local" name="fecha_hora" id="fecha_hora" required>
                    </div>
                    <div>
                        <label for="rol_aplicador">Rol del Aplicador/Responsable</label>
                        <input type="text" name="rol_aplicador" id="rol_aplicador">
                    </div>
                    <div>
                        <label for="turno">Turno</label>
                        <select name="turno" id="turno">
                            <option value="">Seleccione...</option>
                            <option>Diurno</option>
                            <option>Nocturno</option>
                        </select>
                    </div>
                    <div>
                        <label for="nombre_responsable">Nombre del Responsable</label>
                        <input type="text" name="nombre_responsable" id="nombre_responsable">
                    </div>
                    <div class="md:col-span-2">
                        <label for="signaturePadResponsable">Firma del Responsable</label>
                        <div class="signature-container">
                            <canvas id="signaturePadResponsable" class="signature-pad"></canvas>
                        </div>
                        <button type="button" id="clearSignatureResponsable" class="clear-button">Limpiar Firma</button>
                        <input type="hidden" name="firma_responsable" id="firma_responsable">
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>2. Evaluación de la Seguridad (NPS 0–10)</legend>
                <div class="grid md:grid-cols-2">
                    <div>
                        <label for="puntuacion_presencia_personal">Presencia y actitud del personal</label>
                        <select name="puntuacion_presencia_personal" id="puntuacion_presencia_personal" required>
                            <option value="">Seleccione...</option>
                            <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                    <div>
                        <label for="puntuacion_tiempo_respuesta">Tiempo de respuesta ante incidentes</label>
                        <select name="puntuacion_tiempo_respuesta" id="puntuacion_tiempo_respuesta" required>
                             <option value="">Seleccione...</option>
                            <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                    <div>
                        <label for="puntuacion_funcionamiento_sistemas">Funcionamiento de sistemas electrónicos</label>
                        <select name="puntuacion_funcionamiento_sistemas" id="puntuacion_funcionamiento_sistemas" required>
                             <option value="">Seleccione...</option>
                            <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                    <div>
                        <label for="puntuacion_seguridad_parqueaderos">Percepción de seguridad en parqueaderos</label>
                        <select name="puntuacion_seguridad_parqueaderos" id="puntuacion_seguridad_parqueaderos" required>
                             <option value="">Seleccione...</option>
                            <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                    <div>
                        <label for="puntuacion_seguridad_areas_comunes">Percepción de seguridad en áreas comunes</label>
                        <select name="puntuacion_seguridad_areas_comunes" id="puntuacion_seguridad_areas_comunes" required>
                             <option value="">Seleccione...</option>
                            <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                    <div>
                        <label for="puntuacion_comunicacion_informacion">Comunicación e información recibida</label>
                        <select name="puntuacion_comunicacion_informacion" id="puntuacion_comunicacion_informacion" required>
                             <option value="">Seleccione...</option>
                            <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label for="puntuacion_confianza_general">Confianza general en el servicio</label>
                        <select name="puntuacion_confianza_general" id="puntuacion_confianza_general" required>
                             <option value="">Seleccione...</option>
                            <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>3. Riesgos o Incidentes Identificados</legend>
                <div class="grid grid-cols-1">
                    <div>
                        <label for="riesgo_detectado">Riesgo Detectado</label>
                        <textarea name="riesgo_detectado" id="riesgo_detectado" rows="3"></textarea>
                    </div>
                    <div>
                        <label for="novedades_reportadas">Novedades Reportadas</label>
                        <textarea name="novedades_reportadas" id="novedades_reportadas" rows="3"></textarea>
                    </div>
                </div>
            </fieldset>
            
            <fieldset>
                <legend>4. Satisfacción Global</legend>
                <div class="grid md:grid-cols-2">
                    <div>
                        <label for="calificacion_global_nps">Calificación Global (NPS 0–10)</label>
                         <select name="calificacion_global_nps" id="calificacion_global_nps" required>
                             <option value="">Seleccione...</option>
                            <script>for(let i=0; i<=10; i++) document.write(`<option value="${i}">${i}</option>`);</script>
                        </select>
                    </div>
                    <div>
                        <label for="recomendaria_servicio">¿Recomendaría el servicio?</label>
                        <select name="recomendaria_servicio" id="recomendaria_servicio" required>
                            <option value="">Seleccione...</option>
                            <option value="Sí">Sí</option>
                            <option value="No">No</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label for="observaciones_cliente">Observaciones del Cliente</label>
                        <textarea name="observaciones_cliente" id="observaciones_cliente" rows="4"></textarea>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>5. Validación</legend>
                <div>
                    <label for="encuestado">Encuestado</label>
                    <input type="text" name="encuestado" id="encuestado">
                </div>
                <div class="signature-container">
                    <canvas id="signaturePadEncuestado" class="signature-pad"></canvas>
                </div>
                <div>
                    <button type="button" id="clearSignatureEncuestado" class="clear-button">Limpiar Firma</button>
                </div>
                <input type="hidden" name="firma_encuestado" id="firma_encuestado">
            </fieldset>

            <button type="submit" class="submit-button">📋 Enviar Medición</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Signature Pad for Responsable
            const canvasResponsable = document.getElementById('signaturePadResponsable');
            const signaturePadResponsable = new SignaturePad(canvasResponsable, { backgroundColor: 'rgb(255, 255, 255)' });
            document.getElementById('clearSignatureResponsable').addEventListener('click', () => signaturePadResponsable.clear());

            // Signature Pad for Encuestado
            const canvasEncuestado = document.getElementById('signaturePadEncuestado');
            const signaturePadEncuestado = new SignaturePad(canvasEncuestado, { backgroundColor: 'rgb(255, 255, 255)' });
            document.getElementById('clearSignatureEncuestado').addEventListener('click', () => signaturePadEncuestado.clear());
            
            // Handle form submission
            const form = document.getElementById('experienciaForm');
            form.addEventListener('submit', function(event) {
                if (!signaturePadResponsable.isEmpty()) {
                    document.getElementById('firma_responsable').value = signaturePadResponsable.toDataURL('image/png');
                }
                if (!signaturePadEncuestado.isEmpty()) {
                    document.getElementById('firma_encuestado').value = signaturePadEncuestado.toDataURL('image/png');
                }
            });
            
            // Resize canvases
            function resizeCanvases() {
                [canvasResponsable, canvasEncuestado].forEach(canvas => {
                    const ratio =  Math.max(window.devicePixelRatio || 1, 1);
                    canvas.width = canvas.offsetWidth * ratio;
                    canvas.height = canvas.offsetHeight * ratio;
                    canvas.getContext("2d").scale(ratio, ratio);
                });
                signaturePadResponsable.clear();
                signaturePadEncuestado.clear();
            }
            window.addEventListener("resize", resizeCanvases);
            resizeCanvases();
        });
    </script>
</body>
</html>
