<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tzolkin Tech SecApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a7bfe8 0%, #619afc 100%); /* More vibrant, modern gradient */
            background-attachment: fixed; /* Ensures gradient covers full viewport */
        }
        .card-container {
            backdrop-filter: blur(10px); /* Glassmorphism effect */
            background-color: rgba(255, 255, 255, 0.85); /* Slightly transparent white */
            border: 1px solid rgba(255, 255, 255, 0.3); /* Subtle border for definition */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); /* Softer, larger shadow */
        }
        .btn-primary {
            @apply bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-blue-300 focus:ring-opacity-75 transition-all duration-300 ease-in-out transform hover:-translate-y-1 hover:scale-105;
        }
        .btn-secondary {
            @apply bg-gradient-to-r from-purple-500 to-pink-600 text-white font-semibold rounded-lg shadow-lg hover:shadow-xl focus:outline-none focus:ring-4 focus:ring-purple-300 focus:ring-opacity-75 transition-all duration-300 ease-in-out transform hover:-translate-y-1 hover:scale-105;
        }
        /* Add more button styles as needed, e.g., btn-tertiary */
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="card-container p-10 rounded-3xl max-w-lg w-full text-center relative z-10 transition-all duration-500 ease-in-out">
        <h1 class="text-5xl font-extrabold text-gray-900 mb-6 leading-tight">
            Tzolkin Tech <span class="text-indigo-600">SecApp</span>
        </h1>
        <p class="text-xl text-gray-700 mb-10 opacity-90">
            Securely manage your data with ease. Select an option to continue.
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <a href="https://forms-ir5ib344aa-uc.a.run.app" class="btn-primary">
                <span class="block py-3">Fill Out Basic Form</span>
            </a>
            <a href="https://dashboard-ir5ib344aa-uc.a.run.app" class="btn-secondary">
                <span class="block py-3">View Data Dashboard</span>
            </a>
            </div>

        <p class="text-sm text-gray-600 mt-8 opacity-80">
            Your data, securely stored and easily accessible. © 2025 Tzolkin Tech.
        </p>
    </div>
</body>
</html>
