<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error - Kanan Sentinel SecApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #1a202c;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Merriweather', serif;
      color: #ffffff;
    }
    .error-card {
      background-color: #2d3748;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 450px;
      width: 100%;
      padding: 2.5rem;
    }
    .theme-toggle {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 10;
      background-color: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 0.5rem;
      padding: 0.5rem;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      color: #e2e8f0;
    }
    .theme-toggle:hover {
      background-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }
    .theme-toggle svg {
      width: 1.5rem;
      height: 1.5rem;
    }
    
    /* Light mode styles */
    body.light-mode {
      background-color: #f8f9fa;
      color: #343a40;
    }
    
    body.light-mode h1, 
    body.light-mode h2, 
    body.light-mode h3, 
    body.light-mode h4, 
    body.light-mode h5, 
    body.light-mode h6 {
      color: #212529;
    }
    
    body.light-mode .error-card {
      background-color: #ffffff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.05);
    }
    
    body.light-mode .theme-toggle {
      background-color: rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(0, 0, 0, 0.2);
      color: #374151;
    }
    
    body.light-mode .theme-toggle:hover {
      background-color: rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
    <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
    </svg>
    <svg id="lightModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display: none;">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
    </svg>
  </button>

  <div class="error-card text-center">
    <img src="https://storage.googleapis.com/smt-misc/KananSentinel.png" alt="Kanan Logo" class="mx-auto mb-6 w-28 opacity-90" style="border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);" />
    
    <h1 class="text-3xl font-bold mb-4">Error</h1>
    <div class="bg-red-500 text-white p-4 rounded-lg mb-6">
      <p class="font-medium">{{ message }}</p>
    </div>
    
    <div class="space-y-3">
      <a href="{{ login_service_url }}/login" class="block text-blue-400 hover:underline">
        Volver al inicio de sesión
      </a>
      <a href="/" class="block text-blue-400 hover:underline">
        Ir al formulario principal
      </a>
    </div>
  </div>

  <script>
    // Theme toggle elements
    const themeToggle = document.getElementById('themeToggle');
    const darkModeIcon = document.getElementById('darkModeIcon');
    const lightModeIcon = document.getElementById('lightModeIcon');

    // Theme management
    function initializeTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      
      if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
        setLightMode();
      } else {
        setDarkMode();
      }
    }

    function setDarkMode() {
      document.body.classList.remove('light-mode');
      darkModeIcon.style.display = 'block';
      lightModeIcon.style.display = 'none';
      localStorage.setItem('theme', 'dark');
    }

    function setLightMode() {
      document.body.classList.add('light-mode');
      darkModeIcon.style.display = 'none';
      lightModeIcon.style.display = 'block';
      localStorage.setItem('theme', 'light');
    }

    function toggleTheme() {
      if (document.body.classList.contains('light-mode')) {
        setDarkMode();
      } else {
        setLightMode();
      }
    }

    // Initialize theme on page load
    document.addEventListener('DOMContentLoaded', function() {
      initializeTheme();
      
      if (themeToggle) {
        themeToggle.addEventListener('click', toggleTheme);
      }
    });
  </script>
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
</body>
</html>
