<script>
    document.addEventListener("DOMContentLoaded", function() {
        const header = document.getElementById('globalHeaderNav');
        if (header) {
            const setPadding = () => {
                document.body.style.paddingTop = (header.offsetHeight + 30) + 'px';
            };
            setPadding();
            // Optional: Re-adjust if window resizes and the menu wraps
            window.addEventListener('resize', setPadding);
            // In case of late loading fonts or elements
            setTimeout(setPadding, 200);
        }
    });
</script>
