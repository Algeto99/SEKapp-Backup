<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expediente de Instalación · SekApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Roboto',sans-serif; background-color:#1a202c; color:#e2e8f0; min-height:100vh; padding-bottom:3rem; }
    h1,h2,h3,h4 { font-family:'Merriweather',serif; color:#fff; }
    
    .theme-toggle { position:fixed; top:1.25rem; right: 1rem; z-index:100; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:.5rem; padding:.5rem; cursor:pointer; color:#e5e7eb; }
    .theme-toggle svg { width:1.25rem; height:1.25rem; }

    /* Light Mode Overrides */
    body.light-mode { background-color:#f1f5f9; color:#0f172a; }
    body.light-mode h1, body.light-mode h2, body.light-mode h3, body.light-mode h4 { color:#0f172a; }
    body.light-mode .theme-toggle { background:rgba(0,0,0,0.06); color:#334155; border-color:rgba(0,0,0,0.12); }
    body.light-mode .property-bar, body.light-mode .kpi-card, body.light-mode .tl-card, body.light-mode .filter-btn, body.light-mode .range-chip { background-color:#fff; border-color:rgba(0,0,0,0.07); box-shadow:0 2px 8px rgba(0,0,0,.04); }
    body.light-mode .tl-card { background:#fff; }
    body.light-mode .kpi-val, body.light-mode .tl-summary { color:#334155; }
    body.light-mode .kpi-label, body.light-mode .tl-ts, body.light-mode .tl-meta { color:#64748b; }
    body.light-mode .select-field { background:#f8fafc; border-color:rgba(0,0,0,0.15); color:#0f172a; }
    body.light-mode .qr-box { background-color:#fff; border-color:rgba(0,0,0,0.1); }
    body.light-mode .qr-box h3 { color:#0f172a; }
    body.light-mode .timeline::before { background:rgba(0,0,0,.08); }
    body.light-mode .btn-outline { color:#334155; border-color:rgba(0,0,0,0.2); }
    body.light-mode .btn-outline:hover { border-color:rgba(0,0,0,0.4); }

    .main-container { max-width:1280px; margin:0 auto; padding:2rem 1.5rem; }
    .module-header { display:flex; align-items:center; gap:1rem; margin-bottom:1.75rem; padding-bottom:1.5rem; border-bottom:1px solid rgba(255,255,255,0.07); }
    .module-icon { width:50px; height:50px; border-radius:12px; flex-shrink:0; background-color:rgba(167,139,250,.15); color:#a78bfa; display:flex; align-items:center; justify-content:center; }
    
    /* Property selector */
    .property-bar { background:rgba(45,55,72,.6); border:1px solid rgba(255,255,255,.08); border-radius:.75rem; padding:1rem 1.25rem; margin-bottom:1.5rem; display:flex; align-items:center; gap:1rem; flex-wrap:wrap; }
    .select-field { background:#2d3748; border:1px solid rgba(255,255,255,.15); color:#e2e8f0; border-radius:.5rem; padding:.5rem .75rem; font-size:.9rem; min-width:220px; }
    .select-field:focus { outline:none; border-color:#a78bfa; }
    .btn-primary { background:#7c3aed; color:#fff; border:none; border-radius:.5rem; padding:.5rem 1.25rem; font-size:.875rem; cursor:pointer; transition:background .2s; }
    .btn-primary:hover { background:#6d28d9; }

    /* KPI strip */
    .kpi-strip { display:flex; gap:.75rem; overflow-x:auto; padding-bottom:.5rem; margin-bottom:1.75rem; }
    .kpi-strip::-webkit-scrollbar { height:4px; }
    .kpi-strip::-webkit-scrollbar-thumb { background:#4a5568; border-radius:2px; }
    .kpi-card { background:rgba(45,55,72,.7); border:1px solid rgba(255,255,255,.07); border-radius:.75rem; padding:.85rem 1.1rem; min-width:160px; flex-shrink:0; }
    .kpi-month { font-size:.7rem; color:#9ca3af; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.4rem; }
    .kpi-row { display:flex; justify-content:space-between; align-items:center; font-size:.8rem; margin-top:.25rem; }
    .kpi-label { color:#9ca3af; }
    .kpi-val { font-weight:600; color:#e2e8f0; }
    .kpi-red { color:#f87171; }
    .kpi-green { color:#34d399; }
    .kpi-current { border-color:#a78bfa; background:rgba(124,58,237,.15); }

    /* Filter bar */
    .filter-bar { display:flex; gap:.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
    .filter-btn { background:rgba(45,55,72,.6); border:1px solid rgba(255,255,255,.1); color:#9ca3af; border-radius:2rem; padding:.35rem .9rem; font-size:.8rem; cursor:pointer; transition:all .2s; }
    .filter-btn.active { background:rgba(124,58,237,.3); border-color:#a78bfa; color:#a78bfa; font-weight:600; }
    .filter-btn:hover:not(.active) { border-color:rgba(255,255,255,.25); color:#e2e8f0; }

    /* Timeline */
    .timeline { position:relative; }
    .timeline::before { content:''; position:absolute; left:22px; top:0; bottom:0; width:2px; background:rgba(255,255,255,.06); }
    .tl-item { position:relative; padding-left:52px; margin-bottom:1rem; }
    .tl-dot { position:absolute; left:14px; top:16px; width:18px; height:18px; border-radius:50%; border:2px solid #1a202c; flex-shrink:0; }
    .dot-green { background:#34d399; }
    .dot-red   { background:#f87171; }
    .dot-grey  { background:#6b7280; }

    .tl-card { background:rgba(45,55,72,.65); border:1px solid rgba(255,255,255,.07); border-radius:.75rem; padding:1rem 1.25rem; }
    .tl-card-red   { border-left:3px solid #f87171; }
    .tl-card-green { border-left:3px solid #34d399; }
    .tl-card-grey  { border-left:3px solid #6b7280; }

    .tl-header { display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem; flex-wrap:wrap; margin-bottom:.4rem; }
    .tl-module-badge { font-size:.7rem; font-weight:600; letter-spacing:.06em; text-transform:uppercase; border-radius:1rem; padding:.2rem .6rem; }
    .badge-sup  { background:rgba(96,165,250,.2); color:#60a5fa; }
    .badge-inc  { background:rgba(248,113,113,.2); color:#f87171; }
    .badge-acu  { background:rgba(167,139,250,.2); color:#a78bfa; }
    .badge-enc  { background:rgba(245,158,11,.2);  color:#f59e0b; }
    .tl-ts { font-size:.75rem; color:#9ca3af; }
    .tl-summary { font-size:.875rem; color:#e2e8f0; margin-bottom:.5rem; line-height:1.45; }
    .tl-meta { font-size:.75rem; color:#9ca3af; }
    .tl-actions { display:flex; gap:.5rem; margin-top:.65rem; flex-wrap:wrap; align-items:center; }

    .status-pill { font-size:.7rem; font-weight:600; border-radius:1rem; padding:.2rem .65rem; }
    .pill-green { background:rgba(52,211,153,.15); color:#34d399; border:1px solid rgba(52,211,153,.3); }
    .pill-red   { background:rgba(248,113,113,.15); color:#f87171; border:1px solid rgba(248,113,113,.3); }
    .pill-grey  { background:rgba(107,114,128,.15); color:#9ca3af; border:1px solid rgba(107,114,128,.3); }

    .btn-qr { background:rgba(124,58,237,.2); border:1px solid rgba(167,139,250,.4); color:#a78bfa; border-radius:.4rem; padding:.3rem .75rem; font-size:.75rem; cursor:pointer; transition:all .2s; }
    .btn-qr:hover { background:rgba(124,58,237,.4); }

    /* Photo thumbnail */
    .tl-photo { width:56px; height:56px; border-radius:.4rem; object-fit:cover; border:1px solid rgba(255,255,255,.1); cursor:pointer; }

    /* GPS badge */
    .gps-info { font-size:.7rem; color:#9ca3af; }
    .gps-ok  { color:#34d399; }
    .gps-bad { color:#f87171; }

    /* QR Modal */
    #qrModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:200; align-items:center; justify-content:center; }
    #qrModal.open { display:flex; }
    .qr-box { background:#2d3748; border:1px solid rgba(255,255,255,.15); border-radius:1rem; padding:1.75rem; text-align:center; max-width:340px; width:100%; }
    .qr-box h3 { margin-bottom:1rem; font-size:1rem; }
    #qrImg { width:240px; height:240px; border-radius:.5rem; background:#fff; }
    .qr-actions { display:flex; gap:.75rem; justify-content:center; margin-top:1rem; }
    .btn-outline { background:transparent; border:1px solid rgba(255,255,255,.2); color:#e2e8f0; border-radius:.5rem; padding:.45rem 1rem; font-size:.85rem; cursor:pointer; transition:all .2s; }
    .btn-outline:hover { border-color:rgba(255,255,255,.5); }
    .btn-copy { background:rgba(96,165,250,.2); border:1px solid rgba(96,165,250,.4); color:#60a5fa; border-radius:.5rem; padding:.45rem 1rem; font-size:.85rem; cursor:pointer; transition:all .2s; }
    .btn-copy:hover { background:rgba(96,165,250,.35); }
    .btn-email { background:rgba(52,211,153,.15); border:1px solid rgba(52,211,153,.35); color:#34d399; border-radius:.5rem; padding:.45rem 1rem; font-size:.85rem; cursor:pointer; transition:all .2s; }
    .btn-email:hover { background:rgba(52,211,153,.3); }
    #qrEmailForm { margin-top:1rem; display:none; }
    #qrEmailForm input[type=email] { width:100%; box-sizing:border-box; padding:.45rem .7rem; border-radius:.4rem; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.07); color:#e2e8f0; font-size:.85rem; outline:none; }
    #qrEmailForm input[type=email]:focus { border-color:#34d399; }
    #qrEmailSendBtn { margin-top:.5rem; width:100%; padding:.45rem; border-radius:.4rem; background:#34d399; border:none; color:#0f172a; font-weight:600; font-size:.85rem; cursor:pointer; transition:opacity .2s; }
    #qrEmailSendBtn:disabled { opacity:.5; cursor:default; }

    /* Empty / loading states */
    .state-placeholder { text-align:center; padding:3rem 1rem; color:#9ca3af; }
    .state-placeholder svg { width:48px; height:48px; margin:0 auto 1rem; opacity:.35; }

    /* Days range selector */
    .range-chip { background:rgba(45,55,72,.8); border:1px solid rgba(255,255,255,.1); color:#9ca3af; border-radius:2rem; padding:.3rem .75rem; font-size:.78rem; cursor:pointer; }
    .range-chip.active { background:rgba(167,139,250,.2); border-color:#a78bfa; color:#a78bfa; }
  </style>

<script>
  const INITIAL_CLIENTE = {{ initial_cliente | tojson }};

  let currentCliente = null;
  let currentDays = 30;
  let currentFilter = 'ALL';
  let allEvents = [];
  let propHasGps = false;
  let currentQrUrl   = '';
  let currentQrToken = '';

  // ── Month labels in Spanish ───────────────────────────────────────────────
  const MONTH_ES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  function fmtMonth(yymm) {
    const [y, m] = yymm.split('-');
    return `${MONTH_ES[parseInt(m,10)-1]} ${y}`;
  }

  function fmtTs(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('es-GT', { day:'2-digit', month:'short', year:'numeric' })
           + ' ' + d.toLocaleTimeString('es-GT', { hour:'2-digit', minute:'2-digit' });
  }

  // ── Load property list ────────────────────────────────────────────────────
  async function loadProperties() {
    const sel = document.getElementById('propertySelect');
    try {
      const res = await fetch('/expediente/api/clientes');
      const data = await res.json();
      if (!res.ok) {
        sel.innerHTML = `<option value="">— Error: ${data.error || res.status} —</option>`;
        return;
      }
      if (!data.length) {
        sel.innerHTML = '<option value="">— Sin instalaciones con registros —</option>';
        return;
      }
      sel.innerHTML = '<option value="">— Seleccionar instalación —</option>';
      data.forEach(nombre => {
        const opt = document.createElement('option');
        opt.value = nombre;
        opt.textContent = nombre;
        if (INITIAL_CLIENTE && nombre === INITIAL_CLIENTE) opt.selected = true;
        sel.appendChild(opt);
      });
      if (INITIAL_CLIENTE) {
        loadExpediente(INITIAL_CLIENTE);
      }
    } catch(e) {
      console.error('loadProperties:', e);
      sel.innerHTML = '<option value="">— Error de conexión —</option>';
    }
  }

  // ── Load feed + KPI ───────────────────────────────────────────────────────
  async function loadExpediente(cliente) {
    if (!cliente) return;
    currentCliente = cliente;
    showLoading();

    const enc = encodeURIComponent(cliente);
    try {
      const [feedRes, kpiRes] = await Promise.all([
        fetch(`/expediente/api/feed?cliente=${enc}&days=${currentDays}`),
        fetch(`/expediente/api/kpi?cliente=${enc}`)
      ]);
      const feed = await feedRes.json();
      const kpi  = await kpiRes.json();

      if (feed.error) { showError(feed.error); return; }

      allEvents = feed.events || [];
      propHasGps = feed.prop_has_gps;
      const gpsSource = feed.gps_source;
      document.getElementById('btnExpedienteQr').style.display = allEvents.length ? 'inline-flex' : 'none';

      // GPS badge
      const gpsBadge = document.getElementById('gpsBadge');
      if (gpsSource === 'manual') {
        gpsBadge.innerHTML = '<span style="color:#34d399;">&#9679; Geocerca activa &middot; coordenadas manuales (100m)</span>';
      } else if (gpsSource === 'auto') {
        gpsBadge.innerHTML = '<span style="color:#34d399;">&#9679; Geocerca activa &middot; derivada del historial (100m)</span>';
      } else {
        gpsBadge.innerHTML = '<span style="color:#f59e0b;">&#9651; Sin geocerca &mdash; se activa tras 3 supervisiones con GPS</span>';
      }

      renderKpi(kpi.kpi || []);
      if (currentFilter === 'CONFIABILIDAD') {
        loadConfiabilidad(cliente);
      } else {
        renderTimeline();
      }
    } catch(e) {
      console.error('loadExpediente:', e);
      showError('Error al cargar el expediente.');
    }
  }

  // ── KPI strip ─────────────────────────────────────────────────────────────
  function renderKpi(months) {
    const strip = document.getElementById('kpiStrip');
    const wrap  = document.getElementById('kpiStripWrap');
    if (!months.length) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';

    const now = new Date();
    const thisMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

    strip.innerHTML = months.map(m => {
      const isCurrent = m.mes === thisMonth;
      const supPct = (m.supervisiones > 0 && m.en_geocerca !== null)
        ? Math.round(m.en_geocerca / m.supervisiones * 100) : null;
      return `
        <div class="kpi-card ${isCurrent ? 'kpi-current' : ''}">
          <div class="kpi-month">${fmtMonth(m.mes)}</div>
          <div class="kpi-row">
            <span class="kpi-label">Supervisiones</span>
            <span class="kpi-val">${m.supervisiones}</span>
          </div>
          ${supPct !== null ? `
          <div class="kpi-row" style="padding-left:.5rem;">
            <span class="kpi-label" style="font-size:.7rem;">En geocerca</span>
            <span style="font-size:.75rem;font-weight:600;" class="${supPct >= 80 ? 'kpi-green' : 'kpi-red'}">${supPct}%</span>
          </div>` : ''}
          <div class="kpi-row" style="margin-top:.4rem;">
            <span class="kpi-label">Incidentes</span>
            <span class="kpi-val ${m.incidentes_abiertos > 0 ? 'kpi-red' : ''}">${m.incidentes}</span>
          </div>
          ${m.incidentes_criticos > 0 ? `
          <div class="kpi-row" style="padding-left:.5rem;">
            <span class="kpi-label" style="font-size:.7rem;">Críticos</span>
            <span style="font-size:.75rem;font-weight:600;" class="kpi-red">${m.incidentes_criticos}</span>
          </div>` : ''}
          <div class="kpi-row" style="margin-top:.4rem;">
            <span class="kpi-label">Acuerdos</span>
            <span class="kpi-val">${m.acuerdos}</span>
          </div>
          ${m.acuerdos_vencidos > 0 ? `
          <div class="kpi-row" style="padding-left:.5rem;">
            <span class="kpi-label" style="font-size:.7rem;">Vencidos</span>
            <span style="font-size:.75rem;font-weight:600;" class="kpi-red">${m.acuerdos_vencidos}</span>
          </div>` : ''}
          ${m.encuestas > 0 ? `
          <div class="kpi-row" style="margin-top:.4rem;">
            <span class="kpi-label">Encuestas</span>
            <span class="kpi-val" style="color:#f59e0b;">${m.encuestas}</span>
          </div>
          ${m.nps_promedio !== null ? `
          <div class="kpi-row" style="padding-left:.5rem;">
            <span class="kpi-label" style="font-size:.7rem;">NPS prom.</span>
            <span style="font-size:.75rem;font-weight:600;" class="${m.nps_promedio >= 7 ? 'kpi-green' : 'kpi-red'}">${m.nps_promedio}</span>
          </div>` : ''}` : ''}
        </div>`;
    }).join('');
  }

  // ── Timeline ──────────────────────────────────────────────────────────────
  function renderTimeline() {
    const wrap = document.getElementById('timelineWrap');
    const countEl = document.getElementById('eventCount');

    const filtered = currentFilter === 'ALL'
      ? allEvents
      : allEvents.filter(e => e.module === currentFilter);

    countEl.textContent = `${filtered.length} evento${filtered.length !== 1 ? 's' : ''}`;

    if (!filtered.length) {
      wrap.innerHTML = `
        <div class="state-placeholder">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:48px;height:48px;margin:0 auto 1rem;opacity:.35;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
          <p>No hay eventos en este período</p>
        </div>`;
      return;
    }

    wrap.innerHTML = '<div class="timeline">' + filtered.map(e => eventCard(e)).join('') + '</div>';
  }

  function moduleBadge(module) {
    if (module === 'SUPERVISION') return '<span class="tl-module-badge badge-sup">Supervisión</span>';
    if (module === 'INCIDENTE')   return '<span class="tl-module-badge badge-inc">Incidente</span>';
    if (module === 'ACUERDO')     return '<span class="tl-module-badge badge-acu">Acuerdo</span>';
    if (module === 'ENCUESTA')    return '<span class="tl-module-badge badge-enc">Encuesta</span>';
    return `<span class="tl-module-badge">${module}</span>`;
  }

  function statusPill(status) {
    if (status === 'GREEN') return '<span class="status-pill pill-green">● Verde</span>';
    if (status === 'RED')   return '<span class="status-pill pill-red">● Rojo</span>';
    return '<span class="status-pill pill-grey">○ Sin GPS</span>';
  }

  function dotClass(status) {
    if (status === 'GREEN') return 'dot-green';
    if (status === 'RED')   return 'dot-red';
    return 'dot-grey';
  }

  function cardBorderClass(status) {
    if (status === 'GREEN') return 'tl-card-green';
    if (status === 'RED')   return 'tl-card-red';
    return 'tl-card-grey';
  }

  function eventCard(e) {
    const summary = (e.summary || '').trim() || '—';
    const actor   = (e.actor  || '').trim();
    const ts      = fmtTs(e.timestamp);

    let gpsHtml = '';
    if (e.module === 'SUPERVISION') {
      if (e.latitude && e.longitude) {
        const distTxt = e.distance_m != null
          ? `${e.distance_m}m del puesto`
          : 'GPS registrado';
        gpsHtml = `<span class="gps-info ${e.status === 'RED' ? 'gps-bad' : 'gps-ok'}">${distTxt}</span>`;
      } else {
        gpsHtml = '<span class="gps-info">Sin GPS</span>';
      }
    }

    let metaHtml = '';
    if (e.module === 'INCIDENTE' && e.nivel_severidad) {
      metaHtml = `<span style="font-size:.75rem;color:#f59e0b;">Severidad: ${e.nivel_severidad}</span>`;
    }
    if (e.module === 'ACUERDO' && e.compromisos_fecha_limite) {
      metaHtml = `<span style="font-size:.75rem;color:#9ca3af;">Vence: ${e.compromisos_fecha_limite}</span>`;
    }
    if (e.module === 'ENCUESTA' && e.nivel_severidad) {
      const nps = parseInt(e.nivel_severidad, 10);
      const npsColor = nps >= 9 ? '#34d399' : nps >= 7 ? '#60a5fa' : '#f87171';
      metaHtml = `<span style="font-size:.75rem;color:${npsColor};font-weight:600;">NPS: ${e.nivel_severidad}</span>`;
    }

    let photoHtml = '';
    if (e.foto_url) {
      const urls = e.foto_url.startsWith('[')
        ? JSON.parse(e.foto_url)
        : e.foto_url.split(',').map(u => u.trim()).filter(Boolean);
      if (urls.length) {
        photoHtml = `<img src="${urls[0]}" class="tl-photo" alt="foto" onclick="window.open('${urls[0]}','_blank')" title="Ver foto">`;
      }
    }

    return `
      <div class="tl-item" data-module="${e.module}">
        <div class="tl-dot ${dotClass(e.status)}"></div>
        <div class="tl-card ${cardBorderClass(e.status)}">
          <div class="tl-header">
            <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap;">
              ${moduleBadge(e.module)}
              ${statusPill(e.status)}
              ${gpsHtml}
            </div>
            <span class="tl-ts">${ts}</span>
          </div>
          <p class="tl-summary">${escHtml(summary)}</p>
          <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:.5rem;flex-wrap:wrap;">
            <div class="tl-meta">
              ${actor ? `<span style="color:#a0aec0;">${escHtml(actor)}</span>` : ''}
              ${metaHtml ? ` · ${metaHtml}` : ''}
            </div>
            <div class="tl-actions">
              ${photoHtml}
            </div>
          </div>
        </div>
      </div>`;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── QR Modal ──────────────────────────────────────────────────────────────
  async function openExpedienteQrModal() {
    if (!currentCliente) return;
    const modal = document.getElementById('qrModal');
    const img   = document.getElementById('qrImg');
    const urlEl = document.getElementById('qrPublicUrl');
    const dl    = document.getElementById('qrDownloadLink');

    img.src = '';
    dl.removeAttribute('href');
    urlEl.textContent = 'Generando…';
    currentQrUrl   = '';
    currentQrToken = '';
    modal.classList.add('open');

    const enc = encodeURIComponent(currentCliente);
    try {
      const res  = await fetch(`/expediente/api/qr-expediente-url?cliente=${enc}&days=${currentDays}&module=${currentFilter}`);
      const data = await res.json();
      if (res.ok && data.token) {
        currentQrUrl   = data.url;
        currentQrToken = data.token;
        img.src = `/expediente/qr-expediente/${data.token}`;
        dl.href = `/expediente/qr-expediente/${data.token}`;
        dl.download = `expediente_${currentCliente.replace(/\s+/g,'_')}.png`;
        urlEl.textContent = data.url;
      } else {
        urlEl.textContent = data.error || 'No se pudo generar el QR';
      }
    } catch(e) {
      urlEl.textContent = 'Error al generar el QR';
    }
  }

  function closeQrModal() {
    document.getElementById('qrModal').classList.remove('open');
    document.getElementById('qrImg').src = '';
    // reset email form
    document.getElementById('qrEmailForm').style.display = 'none';
    document.getElementById('qrEmailInput').value = '';
    document.getElementById('qrEmailMsg').textContent = '';
  }

  function toggleQrEmailForm() {
    const form = document.getElementById('qrEmailForm');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
    if (form.style.display === 'block') document.getElementById('qrEmailInput').focus();
  }

  async function sendQrByEmail() {
    const toEmail = document.getElementById('qrEmailInput').value.trim();
    const msgEl   = document.getElementById('qrEmailMsg');
    const btn     = document.getElementById('qrEmailSendBtn');
    if (!toEmail) { msgEl.style.color = '#f87171'; msgEl.textContent = 'Ingresá un correo válido.'; return; }
    if (!currentQrToken) { msgEl.style.color = '#f87171'; msgEl.textContent = 'Generá el QR primero.'; return; }
    btn.disabled = true;
    btn.textContent = 'Enviando…';
    msgEl.textContent = '';
    const csrfCookie = document.cookie.split(';').map(c => c.trim()).find(c => c.startsWith('csrf_access_token='));
    const csrfVal    = csrfCookie ? decodeURIComponent(csrfCookie.substring('csrf_access_token='.length)) : '';
    try {
      const res = await fetch('/expediente/api/qr-expediente-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRF-TOKEN': csrfVal },
        body: JSON.stringify({ token: currentQrToken, cliente: currentCliente, to_email: toEmail }),
      });
      const data = await res.json();
      if (res.ok && data.success) {
        msgEl.style.color = '#34d399';
        msgEl.textContent = '¡Correo enviado!';
        document.getElementById('qrEmailInput').value = '';
      } else {
        msgEl.style.color = '#f87171';
        msgEl.textContent = data.error || 'Error al enviar el correo.';
      }
    } catch(e) {
      msgEl.style.color = '#f87171';
      msgEl.textContent = 'Error de conexión.';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Enviar';
    }
  }

  document.getElementById('btnCopyUrl').addEventListener('click', () => {
    if (!currentQrUrl) { alert('Enlace aún no disponible, intentá de nuevo.'); return; }
    navigator.clipboard.writeText(currentQrUrl).then(() => {
      const btn = document.getElementById('btnCopyUrl');
      btn.textContent = '¡Copiado!';
      setTimeout(() => { btn.textContent = 'Copiar enlace'; }, 2000);
    });
  });

  document.getElementById('qrModal').addEventListener('click', function(e) {
    if (e.target === this) closeQrModal();
  });

  // ── Event listeners ───────────────────────────────────────────────────────
  document.getElementById('propertySelect').addEventListener('change', function() {
    if (this.value) {
      history.replaceState(null, '', `/expediente/?cliente=${encodeURIComponent(this.value)}`);
      loadExpediente(this.value);
    }
  });

  document.querySelectorAll('.range-chip').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.range-chip').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentDays = parseInt(this.dataset.days, 10);
      if (currentCliente) loadExpediente(currentCliente);
    });
  });

  document.getElementById('filterBar').addEventListener('click', function(e) {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    if (currentFilter === 'CONFIABILIDAD') {
      document.getElementById('timelineWrap').style.display = 'none';
      document.getElementById('confiabilidadPanel').style.display = 'block';
      if (currentCliente) loadConfiabilidad(currentCliente);
    } else {
      document.getElementById('timelineWrap').style.display = 'block';
      document.getElementById('confiabilidadPanel').style.display = 'none';
      renderTimeline();
    }
  });

  // ── Confiabilidad de Equipos ───────────────────────────────────────────────
  const EQ_COLOR = { green: '#34d399', yellow: '#f59e0b', orange: '#f97316', red: '#f87171' };
  const EQ_BG    = { green: 'rgba(52,211,153,.1)', yellow: 'rgba(245,158,11,.1)', orange: 'rgba(249,115,22,.1)', red: 'rgba(248,113,113,.1)' };
  const EQ_BORDER = { green: 'rgba(52,211,153,.3)', yellow: 'rgba(245,158,11,.3)', orange: 'rgba(249,115,22,.3)', red: 'rgba(248,113,113,.3)' };

  async function loadConfiabilidad(cliente) {
    const panel = document.getElementById('confiabilidadPanel');
    panel.innerHTML = `<div class="state-placeholder"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:36px;height:36px;margin:0 auto 1rem;opacity:.35;animation:spin 1s linear infinite;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><p>Cargando confiabilidad…</p></div>`;
    try {
      const enc = encodeURIComponent(cliente);
      const res = await fetch(`/expediente/api/equipos?cliente=${enc}&days=${currentDays}`);
      const data = await res.json();
      if (data.error || !data.pct_general === undefined) {
        renderConfiabilidadEmpty(panel, data.error);
        return;
      }
      renderConfiabilidad(panel, data);
    } catch (e) {
      renderConfiabilidadEmpty(panel, 'Error al cargar datos de equipos.');
    }
  }

  function renderConfiabilidadEmpty(panel, msg) {
    panel.innerHTML = `<div class="state-placeholder"><p style="color:#9ca3af;">${msg || 'Sin registros de confiabilidad para esta instalación en el período seleccionado.'}</p></div>`;
  }

  function renderConfiabilidad(panel, d) {
    if (!d || d.pct_general === undefined) { renderConfiabilidadEmpty(panel); return; }
    const col = d.color_general || 'grey';
    const mainColor  = EQ_COLOR[col]  || '#9ca3af';
    const mainBg     = EQ_BG[col]     || 'rgba(107,114,128,.1)';
    const mainBorder = EQ_BORDER[col] || 'rgba(107,114,128,.3)';

    const tipoRows = (d.por_tipo || []).map(t => {
      const tc = EQ_COLOR[t.color] || '#9ca3af';
      const pct = t.pct !== null ? t.pct : 0;
      return `
        <div style="margin-bottom:.75rem;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;">
            <span style="font-size:.8375rem;color:#e2e8f0;">${escHtml(t.tipo)}</span>
            <div style="display:flex;align-items:center;gap:.5rem;">
              <span style="font-size:.75rem;color:#9ca3af;">${t.func}/${t.total} eq.</span>
              <span style="font-size:.8375rem;font-weight:700;color:${tc};">${t.pct !== null ? t.pct + '%' : '—'}</span>
            </div>
          </div>
          <div style="height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;">
            <div style="height:100%;width:${pct}%;border-radius:3px;background:${tc};transition:width .4s;"></div>
          </div>
        </div>`;
    }).join('');

    panel.innerHTML = `
      <div style="background:rgba(45,55,72,.65);border:1px solid rgba(255,255,255,.07);border-left:3px solid ${mainColor};border-radius:.75rem;padding:1.25rem;">
        <!-- Title -->
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem;">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:18px;height:18px;color:#a78bfa;flex-shrink:0;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;">Confiabilidad de Equipos</span>
          <span style="font-size:.7rem;color:#4b5563;margin-left:auto;">Últ. inspección: ${escHtml(d.ultima_inspeccion)}</span>
        </div>

        <!-- KPI cards -->
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem;">
          <div style="background:${mainBg};border:1px solid ${mainBorder};border-radius:.65rem;padding:.85rem;text-align:center;">
            <div style="font-size:2rem;font-weight:700;line-height:1;color:${mainColor};">${d.pct_general !== null ? d.pct_general + '%' : '—'}</div>
            <div style="font-size:.68rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-top:.3rem;">Confiabilidad</div>
          </div>
          <div style="background:${mainBg};border:1px solid ${mainBorder};border-radius:.65rem;padding:.85rem;text-align:center;">
            <div style="font-size:.95rem;font-weight:700;color:${mainColor};line-height:1.2;">${escHtml(d.estado_general)}</div>
            <div style="font-size:.68rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-top:.3rem;">Estado</div>
          </div>
          <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:.65rem;padding:.85rem;text-align:center;">
            <div style="font-size:1.1rem;font-weight:700;color:#e2e8f0;line-height:1;">${d.equipos_operativos}<span style="font-size:.75rem;color:#6b7280;font-weight:400;">/${d.total_equipos}</span></div>
            <div style="font-size:.68rem;color:#9ca3af;text-transform:uppercase;letter-spacing:.04em;margin-top:.3rem;">Eq. Operativos</div>
          </div>
        </div>

        <!-- Per-type breakdown -->
        ${d.por_tipo && d.por_tipo.length ? `
          <div style="font-size:.68rem;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:.75rem;">Por tipo de equipo</div>
          ${tipoRows}
        ` : '<p style="font-size:.8rem;color:#6b7280;text-align:center;">Sin desglose por tipo disponible.</p>'}
      </div>`;
  }

  // ── Utility ───────────────────────────────────────────────────────────────
  function showLoading() {
    document.getElementById('confiabilidadPanel').style.display = 'none';
    document.getElementById('timelineWrap').style.display = 'block';
    document.getElementById('timelineWrap').innerHTML = `
      <div class="state-placeholder">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="width:40px;height:40px;margin:0 auto 1rem;opacity:.4;animation:spin 1s linear infinite;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <p>Cargando expediente…</p>
      </div>`;
    document.getElementById('kpiStripWrap').style.display = 'none';
    document.getElementById('gpsBadge').innerHTML = '';
    document.getElementById('eventCount').textContent = '';
  }

  function showError(msg) {
    document.getElementById('timelineWrap').innerHTML = `
      <div class="state-placeholder">
        <p style="color:#f87171;">${msg}</p>
      </div>`;
  }

  // Spinner animation
  const spinStyle = document.createElement('style');
  spinStyle.textContent = '@keyframes spin { to { transform:rotate(360deg); } }';
  document.head.appendChild(spinStyle);

  // ── Init ──────────────────────────────────────────────────────────────────
  loadProperties();
</script>
  <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
    </div><!-- /sidebar-main-content -->
</body>
</html>
