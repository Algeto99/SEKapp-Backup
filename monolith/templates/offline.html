<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sin Conexión - Kanan Sentinel SekApp</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #1a202c; 
            color: #e2e8f0; 
            text-align: center; 
            padding: 50px; 
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { 
            max-width: 400px; 
            margin: 0 auto; 
            background: #2d3748;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
        }
        h1 { 
            color: #f59e0b; 
            margin: 20px 0; 
        }
        .button { 
            background: #3b82f6; 
            color: white; 
            padding: 15px 30px; 
            border: none; 
            border-radius: 8px; 
            font-size: 16px; 
            cursor: pointer; 
            margin: 10px; 
            display: block; 
            width: 100%; 
            text-decoration: none;
            box-sizing: border-box;
        }
        .button:hover {
            background: #2563eb;
        }
        .status {
            background: #065f46;
            color: #10b981;
            padding: 10px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mx-auto mb-6" style="width:14rem;height:14rem;position:relative;"><img src="https://storage.googleapis.com/smt-misc/KananSentinel.png?v=2" alt="Kanan Logo" style="width:100%;height:100%;object-fit:cover;-webkit-mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 50%, transparent 100%);mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 50%, transparent 100%);" /></div>
        <h1>📱 Kanan Sentinel SekApp</h1>
        <h2>🔴 Sin Conexión</h2>
        <p>La aplicación funciona offline. Puedes crear reportes que se enviarán cuando tengas conexión.</p>
        
        <div class="status">
            ✅ Modo offline activo<br>
            📝 Los reportes se guardarán localmente
        </div>
        
        <a href="/" class="button">📝 Crear Reporte Offline</a>
        <button class="button" onclick="location.reload()">🔄 Verificar Conexión</button>
        
        <p style="font-size: 12px; color: #9ca3af; margin-top: 20px;">
            Estado: <span id="status">Verificando...</span>
        </p>
    </div>
    
    <script>
        function updateStatus() {
            const status = document.getElementById('status');
            if (navigator.onLine) {
                status.textContent = 'En línea';
                status.style.color = '#10b981';
                // Auto-redirect when connection is restored
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                status.textContent = 'Sin conexión';
                status.style.color = '#f59e0b';
            }
        }

        // Listen for connection changes
        window.addEventListener('online', updateStatus);
        window.addEventListener('offline', updateStatus);
        
        // Initial check
        updateStatus();
        
        // Check connection every 5 seconds
        setInterval(updateStatus, 5000);
    </script>
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
</body>
</html>
