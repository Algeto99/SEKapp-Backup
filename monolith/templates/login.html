<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Kanan Sentinel SekApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="/forms/manifest.json">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
            color: #ffffff;
        }
        .login-card {
            background-color: #2d3748;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 400px;
            width: 100%;
            padding: 2.5rem;
        }
        .form-input {
            @apply w-full px-5 py-3 border border-gray-600 rounded-lg shadow-sm
                    bg-white text-gray-900 placeholder-gray-500
                    focus:ring-blue-600 focus:border-blue-600 text-base;
        }
        .login-button {
            @apply w-full flex items-center justify-center py-4 px-8 text-lg font-medium rounded-lg
                    transition-all duration-200 ease-in-out cursor-pointer shadow-xl
                    hover:scale-105 bg-blue-600 text-white hover:bg-blue-700
                    focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50;
        }
        .flash-message {
            @apply p-3 mb-4 rounded-lg text-sm font-medium;
        }
        .flash-success { @apply bg-green-500 text-white; }
        .flash-info { @apply bg-blue-500 text-white; }
        .flash-warning { @apply bg-yellow-500 text-gray-900; }
        .flash-danger { @apply bg-red-500 text-white; }
        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            color: #e2e8f0;
        }
        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }
        .theme-toggle svg {
            width: 1.5rem;
            height: 1.5rem;
        }
        
        /* Light mode styles */
        body.light-mode {
            background-color: #f8f9fa;
            color: #343a40;
        }
        
        body.light-mode h1, 
        body.light-mode h2, 
        body.light-mode h3, 
        body.light-mode h4, 
        body.light-mode h5, 
        body.light-mode h6 {
            color: #212529;
        }
        
        body.light-mode .login-card {
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        body.light-mode .theme-toggle {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #374151;
        }
        
        body.light-mode .theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }

        /* Keep form inputs with proper borders in light mode */
        body.light-mode .tom-select-searchable {
            border-color: #d1d5db !important;
            background-color: #ffffff !important;
        }

        body.light-mode .tom-select-searchable:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1) !important;
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
</head>
<body>
    <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
        <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="lightModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>

    <div class="login-card text-center">
        <img src="/static/logo_full.png" alt="Kanan Logo"
            class="mx-auto mb-6 w-24 opacity-90" style="border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.2);" />
        
        <h1 class="text-3xl font-bold mb-2">Iniciar Sesión</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="w-full mb-4">
                    {% for category, message in messages %}
                        <div class="flash-message flash-{{ category }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('login_bp.login') }}" method="POST" class="space-y-6 text-left">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div>
                <label for="username" class="block text-sm font-medium mb-1">Usuario (Email):</label>
                <input type="email" id="username" name="username" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900" placeholder="tu@ejemplo.com" value="{{ username or '' }}" />
            </div>
            <div>
                <label for="password" class="block text-sm font-medium mb-1">Contraseña:</label>
                <input type="password" id="password" name="password" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900" placeholder="Tu contraseña" />
            </div>
            <button type="submit" class="login-button w-full flex items-center justify-center py-4 px-8 text-lg font-medium rounded-lg transition-all duration-200 ease-in-out cursor-pointer shadow-xl hover:scale-105 bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
              Entrar
            </button>
        </form>

        <div class="mt-6 text-sm space-y-2 text-center">
            <a href="{{ url_for('login_bp.register') }}" class="text-blue-400 hover:underline block">
                ¿No tienes cuenta? Regístrate aquí
            </a>
            <a href="{{ url_for('login_bp.forgot_password') }}" class="text-blue-400 hover:underline block">
                ¿Olvidaste tu contraseña?
            </a>
            <button id="install-pwa-btn" onclick="installPWA()" class="mt-4 mx-auto flex items-center justify-center py-2 px-4 text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700" style="display: none;">
                📲 Instalar SekApp
            </button>
        </div>
    </div>

    
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
    <script>
    (function () {
        let deferredInstallPrompt = null;
        const installBtn = document.getElementById('install-pwa-btn');

        window.addEventListener('beforeinstallprompt', function (e) {
            e.preventDefault();
            deferredInstallPrompt = e;
            if (installBtn) {
                installBtn.style.display = 'inline-flex';
            }
        });

        window.installPWA = async function () {
            if (!deferredInstallPrompt) return;
            deferredInstallPrompt.prompt();
            const { outcome } = await deferredInstallPrompt.userChoice;
            if (outcome === 'accepted') {
                if (installBtn) installBtn.style.display = 'none';
            }
            deferredInstallPrompt = null;
        };

        window.addEventListener('appinstalled', function () {
            if (installBtn) installBtn.style.display = 'none';
            deferredInstallPrompt = null;
        });

        const isIos = () => {
            const userAgent = window.navigator.userAgent.toLowerCase();
            return /iphone|ipad|ipod/.test(userAgent);
        };
        const isStandalone = () => {
            return ('standalone' in window.navigator) && window.navigator.standalone;
        };

        if (isIos() && !isStandalone()) {
            if (installBtn) {
                installBtn.style.display = 'inline-flex';
                installBtn.innerHTML = '🍎 Instalar: Toca Compartir <svg style="display:inline;width:16px;height:16px;margin:0 4px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg> y "Agregar a Inicio"';
                installBtn.onclick = function(e) { e.preventDefault(); };
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/forms/sw.js', { scope: '/' })
                .catch(err => console.error('SW register failed:', err));
        }
    })();
    </script>
</body>
</html>
