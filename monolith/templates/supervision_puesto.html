<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Supervisión - Kanan Sentinel SekApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Merriweather', serif;
            color: #ffffff;
        }


        .form-section {
            background-color: #2d3748;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-input,
        .form-select {
            background-color: #4a5568;
            border: 1px solid #718096;
            color: #e2e8f0;
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.2s ease;
        }

        .form-input[type="file"]::-webkit-file-upload-button {
            filter: invert(1);
        }

        .form-input:focus,
        .form-select:focus {
            outline: none;
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5);
        }

        .signature-pad {
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            border: 2px dashed #4a5568;
            border-radius: 0.375rem;
            cursor: crosshair;
            background-color: white;
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1rem;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            color: #e2e8f0;
            width: auto;
        }

        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        body.light-mode {
            background-color: #f8f9fa;
            color: #343a40;
        }

        body.light-mode h1,
        body.light-mode h2,
        body.light-mode h3,
        body.light-mode h4,
        body.light-mode h5,
        body.light-mode h6 {
            color: #212529;
        }


        body.light-mode .form-section {
            background-color: #ffffff;
            border-color: #e2e8f0;
        }

        body.light-mode .form-input,
        body.light-mode .form-select {
            background-color: #e9ecef;
            border-color: #ced4da;
            color: #212529;
        }

        body.light-mode .form-input[type="file"]::-webkit-file-upload-button {
            filter: none;
        }

        body.light-mode .theme-toggle {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #374151;
        }

        body.light-mode .theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {


            body {
            }
        }

        @media (max-width: 640px) {
            body {
            }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
</head>

<body>
    <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
        <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="lightModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>
    {% include '_sidebar.html' %}
    <div class="sidebar-main-content" id="mainContent">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold">Control de Supervisión</h1>
        </header>

        <!-- Geolocation status banner -->
        <div id="geoStatus" class="mb-4 px-4 py-2 rounded-lg text-sm text-center hidden"></div>

        <form id="supervisionForm" action="{{ url_for('forms_bp.submit_supervision_puesto') }}" method="POST"
            enctype="multipart/form-data" class="space-y-6">
            <input type="hidden" name="latitude" id="latitude">
            <input type="hidden" name="longitude" id="longitude">
            <input type="hidden" name="location_accuracy" id="location_accuracy">
            <input type="hidden" name="submitter_timezone" id="submitter_timezone">

            <!-- 1. Datos Generales (GLOBAL) -->
            <div class="form-section">
                <h2 class="text-xl font-bold mb-4">1. Datos Generales (Globales)</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="id_propiedad" class="block text-sm font-medium mb-1">Propiedad / Instalación</label>
                        <select name="id_propiedad" id="id_propiedad" class="form-input form-select" required>
                            <option value="" disabled selected>Cargando propiedades...</option>
                        </select>
                        <input type="hidden" name="cliente_instalacion" id="cliente_instalacion">
                    </div>
                    <div>
                        <label for="fecha_hora" class="block text-sm font-medium mb-1">Fecha y Hora</label>
                        <input type="datetime-local" name="fecha_hora" id="fecha_hora" class="form-input" required>
                    </div>
                    <div>
                        <label for="supervisor" class="block text-sm font-medium mb-1">Nombre Supervisor</label>
                        <input type="text" name="supervisor" id="supervisor" class="form-input" value="{{ name }}" required readonly>
                    </div>
                    <div>
                        <label for="rol_aplicador" class="block text-sm font-medium mb-1">Rol del
                            Aplicador/Responsable</label>
                        <select name="rol_aplicador" id="rol_aplicador" class="form-select" required>
                            <option value="" disabled>Seleccione...</option>
                            <option selected>Supervisor</option>
                            <option>Coordinador</option>
                            <option>Jefe de Operaciones</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Container for Dynamic Supervision Blocks -->
            <div id="supervisionsContainer"></div>

            <div class="flex justify-between pt-4">
                <button type="button" id="addSupervisionBtn"
                    class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:shadow-outline transition duration-300">
                    + Añadir otra supervisión
                </button>

                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg focus:outline-none focus:shadow-outline transition duration-300">
                    Enviar Todas las Supervisiones
                </button>
            </div>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('submitter_timezone').value = Intl.DateTimeFormat().resolvedOptions().timeZone;



            // Set current date and time
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('fecha_hora').value = now.toISOString().slice(0, 16);

            // --- SUPERVISION BLOCK LOGIC ---
            let supervisionCount = 0;
            const container = document.getElementById('supervisionsContainer');
            const addBtn = document.getElementById('addSupervisionBtn');
            const signaturePads = {}; // Store references to signature pads by index

            function createSupervisionBlock(index) {
                const div = document.createElement('div');
                div.className = 'form-section supervision-block border-l-4 border-blue-500 pl-4 bg-gray-800 bg-opacity-50 mt-8';
                div.dataset.index = index;

                div.innerHTML = `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-blue-400">Supervisión #${index + 1}</h2>
                        ${index > 0 ? `<button type="button" class="text-red-400 hover:text-red-300 remove-supervision" onclick="removeSupervision(${index})">Eliminar</button>` : ''}
                    </div>

                    <!-- Moved Fields: Datos del Puesto -->
                    <h3 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Datos del Puesto</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-medium mb-1">Puesto o Área Específica</label>
                            <input type="text" name="supervisions[${index}][puesto_area_especifica]" class="form-input" required>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-2">Horario del Servicio</label>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 p-4 bg-gray-700 bg-opacity-50 rounded-lg border border-gray-600">
                                <div>
                                    <label class="block text-xs text-gray-400 mb-1">Tipo de turno</label>
                                    <select name="supervisions[${index}][horario_servicio]" class="form-select">
                                        <option value="">Seleccione...</option>
                                        <option>Diurno</option>
                                        <option>Nocturno</option>
                                        <option>Mixto</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-400 mb-1">Entrada</label>
                                    <input type="time" name="supervisions[${index}][hora_entrada]" class="form-input">
                                </div>
                                <div>
                                    <label class="block text-xs text-gray-400 mb-1">Salida</label>
                                    <input type="time" name="supervisions[${index}][hora_salida]" class="form-input">
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Tipo de Servicio</label>
                            <select name="supervisions[${index}][tipo_servicio]" class="form-select">
                                <option value="">Seleccione...</option>
                                <option>Residencial</option>
                                <option>Industrial</option>
                                <option>Comercial</option>
                                <option>Escolta</option>
                            </select>
                        </div>
                    </div>

                    <!-- Datos del Guardia -->
                    <h3 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Datos del Guardia de Seguridad</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-medium mb-1">Nombre y Apellido</label>
                            <input type="text" name="supervisions[${index}][nombre_guardia]" class="form-input" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Número de Empleado</label>
                            <input type="text" name="supervisions[${index}][numero_empleado]" class="form-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Documento</label>
                            <input type="text" name="supervisions[${index}][documento_guardia]" class="form-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Tiempo en el puesto (meses)</label>
                            <select name="supervisions[${index}][tiempo_en_puesto]" class="form-select tiempo-en-puesto-select" data-index="${index}">
                                <option value="">Seleccione...</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="5">5</option>
                                <option value="6">6</option>
                                <option value="7">7</option>
                                <option value="8">8</option>
                                <option value="9">9</option>
                                <option value="10">10</option>
                                <option value="11">11</option>
                                <option value="12">12</option>
                                <option value="Otro">Otro</option>
                            </select>
                            <div id="tiempoPuestoOtro_${index}" class="hidden mt-2">
                                <input type="number" id="tiempoPuestoOtroInput_${index}" class="form-input" placeholder="Ingrese cantidad de meses" min="1" step="1" pattern="[0-9]*">
                                <p class="text-xs text-gray-400 mt-1">Solo números enteros.</p>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">No. de licencia para portar arma</label>
                            <input type="text" name="supervisions[${index}][licencia_portar_arma]" class="form-input">
                        </div>
                    </div>

                    <!-- Inducción -->
                    <h3 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Inducción de Puesto</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="block text-sm font-medium mb-1">¿Se realiza inducción al puesto?</label>
                            <select name="supervisions[${index}][realiza_induccion]" class="form-select">
                                <option value="">Seleccione...</option>
                                <option>Sí</option>
                                <option>No</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">¿Conoce Órdenes y Consignas?</label>
                            <select name="supervisions[${index}][conoce_ordenes_consignas]" class="form-select">
                                <option value="">Seleccione...</option>
                                <option>Sí</option>
                                <option>No</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1">¿Horario y detalles claros?</label>
                            <select name="supervisions[${index}][horario_detalles_claros]" class="form-select">
                                <option value="">Seleccione...</option>
                                <option>Sí</option>
                                <option>No</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1">Porta arma en el puesto</label>
                            <select name="supervisions[${index}][porta_arma]" class="form-select porta-arma-select" data-index="${index}">
                                <option value="">Seleccione...</option>
                                <option value="Si">Sí</option>
                                <option value="No">No</option>
                            </select>
                        </div>
                        <div id="armaFields_${index}" class="hidden md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium mb-1">Tipo de Arma</label>
                                <select name="supervisions[${index}][tipo_arma]" class="form-select">
                                    <option value="">Seleccione...</option>
                                    <option>Escopeta</option>
                                    <option>Pistola</option>
                                    <option>Revolver</option>
                                    <option>No Aplica</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Serie del Arma</label>
                                <input type="text" name="supervisions[${index}][serie_arma]" class="form-input">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Matrícula</label>
                                <input type="text" name="supervisions[${index}][matricula_arma]" class="form-input">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Cantidad de munición</label>
                                <input type="text" name="supervisions[${index}][cantidad_municion]" class="form-input">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Fecha de vencimiento permiso de porte</label>
                                <input type="date" name="supervisions[${index}][fecha_vencimiento_permiso_porte]" class="form-input">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Fecha último mtto (arma)</label>
                                <input type="date" name="supervisions[${index}][fecha_ultimo_mtto_arma]" class="form-input">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Radio asignado (serial)</label>
                            <input type="text" name="supervisions[${index}][radio_asignado_serial]" class="form-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Marca radio</label>
                            <input type="text" name="supervisions[${index}][marca_radio]" class="form-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Tipo de radio</label>
                            <input type="text" name="supervisions[${index}][tipo_radio]" class="form-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Fecha último mtto (radio)</label>
                            <input type="date" name="supervisions[${index}][fecha_ultimo_mtto_radio]" class="form-input">
                        </div>
                    </div>

                    <!-- Inspección -->
                    <h3 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Inspección de Puesto</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        ${generateSelectField(index, 'asistencia_puntualidad', 'Asistencia y puntualidad')}
                        
                        <div>
                            <label class="block text-sm font-medium mb-1">Presentación y Uniforme</label>
                            <select name="supervisions[${index}][presentacion_uniforme]" class="form-select presentacion_uniforme-select" data-index="${index}">
                                <option value="">Seleccione...</option>
                                <option value="1">1 — Muy deficiente (incumplimiento grave)</option>
                                <option value="2">2 — Deficiente (requiere corrección)</option>
                                <option value="3">3 — Aceptable (cumple mínimo)</option>
                                <option value="4">4 — Bueno (sobre el estándar)</option>
                                <option value="5">5 — Excelente (referencia)</option>
                            </select>
                            
                            <!-- Detalles de Uniforme -->
                            <div id="uniformeFields_${index}" class="hidden mt-3 p-3 bg-gray-700 bg-opacity-50 rounded-lg border border-gray-600">
                                <label class="block text-sm font-medium mb-2">Prendas con problemas</label>
                                <div class="flex flex-wrap gap-4">
                                    <label class="inline-flex items-center cursor-pointer">
                                        <input type="checkbox" name="supervisions[${index}][problemas_uniforme][]" value="Gorra" class="form-checkbox h-5 w-5 text-blue-600 rounded bg-gray-800 border-gray-600">
                                        <span class="ml-2 text-sm">Gorra</span>
                                    </label>
                                    <label class="inline-flex items-center cursor-pointer">
                                        <input type="checkbox" name="supervisions[${index}][problemas_uniforme][]" value="Camisa" class="form-checkbox h-5 w-5 text-blue-600 rounded bg-gray-800 border-gray-600">
                                        <span class="ml-2 text-sm">Camisa</span>
                                    </label>
                                    <label class="inline-flex items-center cursor-pointer">
                                        <input type="checkbox" name="supervisions[${index}][problemas_uniforme][]" value="Pantalon" class="form-checkbox h-5 w-5 text-blue-600 rounded bg-gray-800 border-gray-600">
                                        <span class="ml-2 text-sm">Pantalón</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        ${generateSelectField(index, 'estado_limpieza_puesto', 'Estado y limpieza del puesto')}
                        ${generateSelectField(index, 'equipamiento_completo', 'Equipamiento (radio, etc.)')}
                        ${generateSelectField(index, 'estado_bitacora', 'Estado de bitácora y registros')}
                    </div>

                    <!-- Observaciones -->
                    <h3 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Observaciones</h3>
                    <div class="mb-6">
                        <textarea name="supervisions[${index}][observaciones_novedades]" rows="3" class="form-input" placeholder="Detalle cualquier punto relevante..."></textarea>
                    </div>

                    <!-- Foto -->
                    <h3 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Foto/Evidencia</h3>
                    <div class="mb-6">
                         <input type="file" name="supervisions[${index}][foto_evidencia]" class="form-input" accept="image/*,application/pdf">
                    </div>

                    <!-- Firmas -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <h3 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Firma Supervisor</h3>
                            <label class="block text-sm font-medium mb-1">Firma</label>
                            <canvas id="signaturePadSupervisor_${index}" class="signature-pad w-full h-32"></canvas>
                            <button type="button" class="mt-2 text-sm text-blue-400 hover:text-blue-300 clear-sig-supervisor-btn" data-index="${index}">Limpiar Firma</button>
                            <input type="hidden" name="supervisions[${index}][firma_supervisor]" id="firma_supervisor_${index}">
                        </div>
                        <div>
                            <h3 class="text-lg font-bold mb-4 border-b border-gray-600 pb-2">Firma del Guardia</h3>
                            <label class="block text-sm font-medium mb-1">Firma</label>
                            <canvas id="signaturePadGuardia_${index}" class="signature-pad w-full h-32"></canvas>
                            <button type="button" class="mt-2 text-sm text-blue-400 hover:text-blue-300 clear-sig-btn" data-index="${index}">Limpiar Firma</button>
                            <input type="hidden" name="supervisions[${index}][firma_guardia]" id="firma_guardia_${index}">
                        </div>
                    </div>
                `;

                return div;
            }

            function generateSelectField(index, name, label) {
                return `
                    <div>
                        <label class="block text-sm font-medium mb-1">${label}</label>
                        <select name="supervisions[${index}][${name}]" class="form-select ${name}-select" data-index="${index}">
                            <option value="">Seleccione...</option>
                            <option value="1">1 — Muy deficiente (incumplimiento grave)</option>
                            <option value="2">2 — Deficiente (requiere corrección)</option>
                            <option value="3">3 — Aceptable (cumple mínimo)</option>
                            <option value="4">4 — Bueno (sobre el estándar)</option>
                            <option value="5">5 — Excelente (referencia)</option>
                        </select>
                    </div>
                `;
            }

            function initSignaturePadCanvas(canvas, storageKey) {
                const pad = new SignaturePad(canvas, {
                    backgroundColor: 'rgb(255, 255, 255)',
                    penColor: 'rgb(0, 0, 0)',
                    minWidth: 0.5,
                    maxWidth: 2.5,
                    throttle: 0
                });
                signaturePads[storageKey] = pad;

                function resize() {
                    const data = pad.toData();
                    const ratio = Math.max(window.devicePixelRatio || 1, 1);
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width * ratio;
                    canvas.height = rect.height * ratio;
                    canvas.getContext('2d').scale(ratio, ratio);
                    pad.clear();
                    pad.fromData(data);
                }

                resize();

                let resizeTimer;
                const resizeObserver = new ResizeObserver(() => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(resize, 100);
                });
                resizeObserver.observe(canvas.parentElement);

                return pad;
            }

            function initSignaturePad(index) {
                const canvasGuardia = document.getElementById(`signaturePadGuardia_${index}`);
                const padGuardia = initSignaturePadCanvas(canvasGuardia, `guardia_${index}`);

                const btnGuardia = canvasGuardia.parentNode.querySelector('.clear-sig-btn');
                btnGuardia.addEventListener('click', () => { padGuardia.clear(); });

                const canvasSupervisor = document.getElementById(`signaturePadSupervisor_${index}`);
                const padSupervisor = initSignaturePadCanvas(canvasSupervisor, `supervisor_${index}`);

                const btnSupervisor = canvasSupervisor.parentNode.querySelector('.clear-sig-supervisor-btn');
                btnSupervisor.addEventListener('click', () => { padSupervisor.clear(); });
            }

            function addSupervision() {
                const index = supervisionCount++;
                const block = createSupervisionBlock(index);
                container.appendChild(block);

                initSignaturePad(index);

                // Arma logic
                const sel = block.querySelector('.porta-arma-select');
                const fields = document.getElementById(`armaFields_${index}`);
                sel.addEventListener('change', function () {
                    if (this.value === 'Si') fields.classList.remove('hidden');
                    else fields.classList.add('hidden');
                });

                // Tiempo en el puesto "Otro" logic
                const selTiempo = block.querySelector('.tiempo-en-puesto-select');
                const tiempoOtroDiv = document.getElementById(`tiempoPuestoOtro_${index}`);
                const tiempoOtroInput = document.getElementById(`tiempoPuestoOtroInput_${index}`);
                if (selTiempo && tiempoOtroDiv && tiempoOtroInput) {
                    selTiempo.addEventListener('change', function () {
                        if (this.value === 'Otro') {
                            tiempoOtroDiv.classList.remove('hidden');
                            tiempoOtroInput.required = true;
                        } else {
                            tiempoOtroDiv.classList.add('hidden');
                            tiempoOtroInput.required = false;
                            tiempoOtroInput.value = '';
                        }
                    });
                }

                // Uniforme logic
                const selUniforme = block.querySelector('.presentacion_uniforme-select');
                const fieldsUniforme = document.getElementById(`uniformeFields_${index}`);
                if (selUniforme && fieldsUniforme) {
                    selUniforme.addEventListener('change', function () {
                        const val = parseInt(this.value);
                        if (!isNaN(val) && val < 5) {
                            fieldsUniforme.classList.remove('hidden');
                        } else {
                            fieldsUniforme.classList.add('hidden');
                            // Opcional: limpiar los checkboxes si se oculta
                            const checkboxes = fieldsUniforme.querySelectorAll('input[type="checkbox"]');
                            checkboxes.forEach(cb => cb.checked = false);
                        }
                    });
                }
            }

            // Define removeSupervision as a global function so onclick can access it
            window.removeSupervision = function (index) {
                const block = container.querySelector(`[data-index="${index}"]`);
                if (block) {
                    // Clean up signature pad references
                    delete signaturePads[`guardia_${index}`];
                    delete signaturePads[`supervisor_${index}`];
                    // Remove the block from DOM
                    block.remove();

                    // Renumber remaining blocks
                    const remainingBlocks = container.querySelectorAll('.supervision-block');
                    remainingBlocks.forEach((blk, idx) => {
                        const header = blk.querySelector('h2');
                        if (header) {
                            header.textContent = `Supervisión #${idx + 1}`;
                        }
                    });
                }
            };

            addBtn.addEventListener('click', addSupervision);

            // Before submit: serialize signature pads to hidden inputs
            document.getElementById('supervisionForm').addEventListener('submit', function () {
                const blocks = container.querySelectorAll('.supervision-block');
                blocks.forEach(block => {
                    const idx = block.dataset.index;
                    const padGuardia = signaturePads[`guardia_${idx}`];
                    if (padGuardia && !padGuardia.isEmpty()) {
                        document.getElementById(`firma_guardia_${idx}`).value = padGuardia.toDataURL();
                    }
                    const padSupervisor = signaturePads[`supervisor_${idx}`];
                    if (padSupervisor && !padSupervisor.isEmpty()) {
                        document.getElementById(`firma_supervisor_${idx}`).value = padSupervisor.toDataURL();
                    }
                });
            });

            // Before submit: copy "Otro" numeric values into the select value
            document.getElementById('supervisionForm').addEventListener('submit', function (e) {
                const tiempoSelects = container.querySelectorAll('.tiempo-en-puesto-select');
                for (const sel of tiempoSelects) {
                    if (sel.value === 'Otro') {
                        const idx = sel.dataset.index;
                        const otroInput = document.getElementById(`tiempoPuestoOtroInput_${idx}`);
                        const val = otroInput ? otroInput.value.trim() : '';
                        if (!val || !/^\d+$/.test(val)) {
                            e.preventDefault();
                            otroInput.focus();
                            otroInput.setCustomValidity('Ingrese un número entero válido.');
                            otroInput.reportValidity();
                            return;
                        }
                        otroInput.setCustomValidity('');
                        // Add a new option with the numeric value and select it
                        const opt = document.createElement('option');
                        opt.value = val;
                        opt.text = val;
                        sel.appendChild(opt);
                        sel.value = val;
                    }
                }
            });

            // Add one supervision block by default
            addSupervision();


        });

        // --- GEOLOCATION ---
        (function captureLocation() {
            const banner = document.getElementById('geoStatus');

            function showBanner(msg, colorClasses) {
                banner.textContent = msg;
                banner.className = 'mb-4 px-4 py-2 rounded-lg text-sm text-center ' + colorClasses;
                banner.classList.remove('hidden');
            }

            if (!navigator.geolocation) {
                showBanner('Geolocalización no soportada en este dispositivo.', 'bg-yellow-800 text-yellow-200');
                return;
            }

            showBanner('Obteniendo ubicación…', 'bg-blue-900 text-blue-200');

            navigator.geolocation.getCurrentPosition(
                function (pos) {
                    document.getElementById('latitude').value  = pos.coords.latitude;
                    document.getElementById('longitude').value = pos.coords.longitude;
                    document.getElementById('location_accuracy').value = pos.coords.accuracy;
                    showBanner(
                        'Ubicación capturada ✓ (' + pos.coords.latitude.toFixed(5) + ', ' + pos.coords.longitude.toFixed(5) + ')',
                        'bg-green-800 text-green-200'
                    );
                },
                function (err) {
                    const msgs = {
                        1: 'Permiso de ubicación denegado. La ubicación no será registrada.',
                        2: 'Ubicación no disponible.',
                        3: 'Tiempo de espera agotado al obtener la ubicación.'
                    };
                    showBanner(msgs[err.code] || 'Error al obtener ubicación.', 'bg-red-900 text-red-200');
                },
                { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
            );
        })();
    </script>
