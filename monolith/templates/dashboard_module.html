<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ module_name }} — Dashboard · Kanan Sentinel SekApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            min-height: 100vh;
            padding-bottom: 3rem;
        }
        h1,h2,h3,h4,h5,h6 { font-family: 'Merriweather', serif; color: #ffffff; }

        /* ── Nav ────────────────────────────────────────────────────────── */

        .nav-link-back {
            display:flex; align-items:center; gap:0.375rem;
            color:#94a3b8; font-size:0.875rem; text-decoration:none;
            transition:color 0.2s;
        }
        .nav-link-back:hover { color:#e2e8f0; }
        .nav-link-back svg { width:14px; height:14px; }


        /* ── Theme toggle ───────────────────────────────────────────────── */
        .theme-toggle {
            position:fixed; top:1.25rem; right: 1rem; z-index:100;
            background-color:rgba(255,255,255,0.1);
            border:1px solid rgba(255,255,255,0.2);
            border-radius:0.5rem; padding:0.5rem; cursor:pointer;
            transition:all 0.2s; color:#e2e8f0;
        }
        .theme-toggle:hover { background-color:rgba(255,255,255,0.2); transform:scale(1.05); }
        .theme-toggle svg { width:1.25rem; height:1.25rem; }

        /* ── Page container ─────────────────────────────────────────────── */
        .main-container { max-width:1200px; margin:0 auto; padding:2rem 1.5rem; }

        /* ── Module header ──────────────────────────────────────────────── */
        .module-header {
            display:flex; align-items:center; gap:1rem;
            margin-bottom:2rem; padding-bottom:1.5rem;
            border-bottom:1px solid rgba(255,255,255,0.07);
        }
        .module-header-icon {
            width:52px; height:52px; border-radius:12px;
            display:flex; align-items:center; justify-content:center; flex-shrink:0;
        }
        .module-header-icon svg { width:26px; height:26px; }
        .module-header-text h1 { font-size:1.5rem; margin:0 0 0.25rem; }
        .module-header-text p {
            font-family:'Roboto',sans-serif; font-size:0.875rem;
            color:#64748b; margin:0;
        }

        /* ── Coming-soon notice ──────────────────────────────────────────── */
        .coming-soon {
            background-color:#2d3748;
            border:1px dashed rgba(255,255,255,0.15);
            border-radius:14px; padding:3rem 2rem;
            text-align:center; margin-top:1.5rem;
        }
        .coming-soon svg { width:48px; height:48px; color:#4b5563; margin:0 auto 1rem; display:block; }
        .coming-soon h3 { font-size:1.125rem; color:#94a3b8; margin:0 0 0.5rem; }
        .coming-soon p { font-size:0.875rem; color:#4b5563; font-family:'Roboto',sans-serif; margin:0; }

        /* ── Color accents ───────────────────────────────────────────────── */
        .accent-green  { background-color:rgba(16,185,129,0.15); color:#34d399; }
        .accent-red    { background-color:rgba(239,68,68,0.15);  color:#f87171; }
        .accent-blue   { background-color:rgba(59,130,246,0.15); color:#60a5fa; }
        .accent-purple { background-color:rgba(139,92,246,0.15); color:#a78bfa; }
        .accent-amber  { background-color:rgba(245,158,11,0.15); color:#fbbf24; }
        .accent-orange { background-color:rgba(249,115,22,0.15); color:#fb923c; }
        .accent-teal   { background-color:rgba(20,184,166,0.15); color:#2dd4bf; }
        .accent-indigo { background-color:rgba(99,102,241,0.15); color:#818cf8; }
        .accent-slate  { background-color:rgba(100,116,139,0.15);color:#94a3b8; }
        .accent-blue-purple { background:linear-gradient(135deg,rgba(29,78,216,0.25),rgba(109,40,217,0.25)); color:#a5b4fc; }

        /* ── Light mode ─────────────────────────────────────────────────── */
        body.light-mode { background-color:#f1f5f9; color:#1e293b; }
        body.light-mode h1,body.light-mode h2,body.light-mode h3,
        body.light-mode h4,body.light-mode h5,body.light-mode h6 { color:#0f172a; }

        body.light-mode .theme-toggle { background-color:rgba(0,0,0,0.07); border-color:rgba(0,0,0,0.15); color:#374151; }
        body.light-mode .module-header { border-bottom-color:rgba(0,0,0,0.07); }
        body.light-mode .module-header-text p { color:#94a3b8; }
        body.light-mode .coming-soon { background-color:#ffffff; border-color:rgba(0,0,0,0.1); }
        body.light-mode .coming-soon h3 { color:#64748b; }
        body.light-mode .nav-link-back { color:#94a3b8; }
        body.light-mode .nav-link-back:hover { color:#1e293b; }

        /* ── Responsive ─────────────────────────────────────────────────── */
        @media (max-width:768px) {

            body { }
        }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
</head>

<body>
    <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
        <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="lightModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" style="display:none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>

    {% include '_sidebar.html' %}
    <div class="sidebar-main-content" id="mainContent">
    <div class="snw-topbar">
        <div class="snw-topbar-left">
            <button class="snw-page-icon" id="snwPageIcon" style="background:linear-gradient(135deg,#6366f1,#8b5cf6)" title="Mostrar/Ocultar menú">
                <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8v8m-4-5v5m-4-2v2m-2 4h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </button>
            <div>
                <div class="snw-page-title">Dashboard</div>
                <div class="snw-page-subtitle">Análisis detallado del módulo seleccionado</div>
            </div>
        </div>
    </div>

        <!-- Module header -->

        <!-- Filter bar -->
        {% include '_dashboard_filters.html' %}

        <!-- Dashboard content goes here -->
        {% block dashboard_content %}
        <div class="coming-soon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
            </svg>
            <h3>Dashboard en construcción</h3>
            <p>El dashboard de <strong>{{ module_name }}</strong> estará disponible próximamente.</p>
        </div>
        {% endblock %}

    </div>

    <script>
        const themeToggle  = document.getElementById('themeToggle');
        const darkModeIcon = document.getElementById('darkModeIcon');
        const lightModeIcon= document.getElementById('lightModeIcon');

        
        
        
        themeToggle.addEventListener('click', () => {
            document.body.classList.contains('light-mode') ? setDarkMode() : setLightMode();
        });
        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            const filters = new DashboardFilters();
            filters.init();
            // Each module's dashboard will listen here when implemented:
            // document.addEventListener('filtersChanged', (e) => loadData(filters.toQueryString()));
        });
    </script>
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
    </div><!-- /sidebar-main-content -->
</body>
</html>
