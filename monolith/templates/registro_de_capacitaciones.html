<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Capacitaciones - Kanan Sentinel SecApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            padding-top: 80px;
            /* Adjust for fixed header */
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Merriweather', serif;
            color: #ffffff;
        }

        .form-section {
            background-color: #2d3748;
            border-radius: 8px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .form-input,
        .form-select,
        .form-textarea {
            background-color: #4a5568;
            border: 1px solid #718096;
            color: #e2e8f0;
            border-radius: 0.375rem;
            padding: 0.75rem 1rem;
            width: 100%;
            transition: all 0.2s ease;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.5);
        }

        .signature-pad {
            border: 2px dashed #4a5568;
            border-radius: 0.375rem;
            background-color: white;
            width: 100%;
            height: 150px;
        }

        .attendee-block {
            background-color: #4a5568;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #718096;
        }

        .header-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(45, 55, 72, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 1.5rem;
            z-index: 50;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .nav-link {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: #93c5fd;
            text-decoration: underline;
        }

        .user-greeting {
            font-size: 0.875rem;
            color: #9ca3af;
        }

        .user-name {
            color: #60a5fa;
            font-weight: bold;
        }

        .admin-badge {
            color: #a855f7;
            font-weight: bold;
        }

        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            left: 1.5rem;
            z-index: 100;
            background-color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            color: #e2e8f0;
        }

        .theme-toggle:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        .theme-toggle svg {
            width: 1.5rem;
            height: 1.5rem;
        }

        body.light-mode {
            background-color: #f8f9fa;
            color: #343a40;
        }

        body.light-mode h1,
        body.light-mode h2,
        body.light-mode h3 {
            color: #212529;
        }

        body.light-mode .form-section,
        body.light-mode .attendee-block {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
        }

        body.light-mode .form-input,
        body.light-mode .form-select,
        body.light-mode .form-textarea {
            background-color: #f1f3f5;
            border-color: #ced4da;
            color: #495057;
        }

        body.light-mode .header-nav {
            background-color: rgba(255, 255, 255, 0.95);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        body.light-mode .user-greeting {
            color: #4a5568;
        }

        body.light-mode .theme-toggle {
            background-color: rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.2);
            color: #374151;
        }

        body.light-mode .theme-toggle:hover {
            background-color: rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
            }

            body {
                padding-top: 120px;
            }
        }
    </style>
</head>

<body>
    <button id="themeToggle" class="theme-toggle" title="Cambiar tema">
        <svg id="darkModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        <svg id="lightModeIcon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
            style="display: none;">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
    </button>
    <div class="header-nav">
        <div class="nav-content">
            <div class="flex items-center gap-3">
                <img src="https://storage.googleapis.com/smt-misc/KananSentinel.png" alt="Logo"
                    class="w-8 h-8 rounded-md shadow-sm">
                <div class="user-greeting">
                    Bienvenido, <span class="user-name">{{ name }}</span>
                    {% if is_admin %}<span class="admin-badge">(Admin)</span>{% endif %}
                </div>
            </div>
            <div class="nav-links">
                <a href="{{ landing_service_url }}" class="nav-link">Inicio</a>
                {% if is_admin %}
                <a href="{{ dashboard_service_url }}" class="nav-link">Dashboard</a>
                <a href="{{ viewer_service_url }}" class="nav-link">Reportes</a>
                {% endif %}
                <a href="{{ url_for('forms_bp.select_form') }}" class="nav-link">Seleccionar Formulario</a>
                <a href="{{ login_service_url }}/logout" class="nav-link">Cerrar Sesión</a>
            </div>
        </div>
    </div>
    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold">Control de Capacitaciones</h1>
        </header>
        <form id="capacitacionForm" action="{{ url_for('forms_bp.submit_registro_de_capacitaciones') }}" method="POST"
            enctype="multipart/form-data">
            <div class="form-section">
                <h2 class="text-xl font-bold mb-4">1. Datos de la Capacitación/Reunión/Entrenamiento</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="fecha" class="block text-sm font-medium mb-1">Fecha</label>
                        <input type="date" name="fecha" id="fecha" class="form-input" required>
                    </div>
                    <div>
                        <label for="hora_inicio" class="block text-sm font-medium mb-1">Hora de Inicio</label>
                        <input type="time" name="hora_inicio" id="hora_inicio" class="form-input" required>
                    </div>
                    <div class="md:col-span-2">
                        <label for="tema_capacitacion" class="block text-sm font-medium mb-1">Tema de la
                            Capacitación</label>
                        <input type="text" name="tema_capacitacion" id="tema_capacitacion" class="form-input" required>
                    </div>
                    <div>
                        <label for="nombre_responsable" class="block text-sm font-medium mb-1">Nombre del
                            Responsable/Capacitador</label>
                        <input type="text" name="nombre_responsable" id="nombre_responsable" value="{{ name }}"
                            class="form-input" required>
                    </div>
                    <div>
                        <label for="cargo_responsable" class="block text-sm font-medium mb-1">Cargo</label>
                        <input type="text" name="cargo_responsable" id="cargo_responsable" class="form-input">
                    </div>
                    <div class="md:col-span-2">
                        <label for="firma_responsable" class="block text-sm font-medium mb-2">Firma del
                            Responsable</label>
                        <canvas id="firma-responsable-pad" class="signature-pad w-full h-48"></canvas>
                        <button type="button" id="clear-responsable"
                            class="mt-2 text-sm text-blue-400 hover:text-blue-300">Limpiar Firma</button>
                        <input type="hidden" name="firma_responsable" id="firma_responsable">
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium mb-2">Fotos/Documentos de la Capacitación</label>
                        <div class="file-upload-area">
                            <input type="file" id="capacitacion_files" name="capacitacion_files"
                                accept="image/*,application/pdf" multiple class="hidden" onchange="updateFileList()">
                            <button type="button" onclick="document.getElementById('capacitacion_files').click()"
                                class="form-input text-left cursor-pointer hover:bg-opacity-80">
                                📎 Seleccionar o Tomar Foto/Documento
                            </button>
                            <div id="fileList" class="mt-2 text-sm text-gray-400"></div>
                            <div class="mt-2">
                                <input type="checkbox" name="capacitacion_files_na" id="capacitacion_files_na">
                                <label for="capacitacion_files_na" class="text-sm ml-2">No Aplica</label>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="form-section">
                <h2 class="text-xl font-bold mb-4">2. Lista de Asistencia</h2>
                <div id="attendees-container"></div>
                <button type="button" id="add-attendee"
                    class="mt-4 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">
                    + Agregar Asistente
                </button>
                <input type="hidden" name="lista_asistencia" id="lista_asistencia">
            </div>
            <div class="flex justify-end pt-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg">
                    Enviar Registro
                </button>
            </div>
        </form>
    </div>

    <script>
        let responsablePad;
        let attendeePads = [];
        let attendeeCounter = 0;

        function resizeCanvas(canvas, pad) {
            // Capture data
            let data;
            if (pad) {
                data = pad.toData();
            }

            const ratio = Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            canvas.getContext("2d").scale(ratio, ratio);

            // Restore data
            if (pad && data) {
                pad.clear();
                pad.fromData(data);
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            // Theme Toggle Logic
            const themeToggle = document.getElementById('themeToggle');
            const darkModeIcon = document.getElementById('darkModeIcon');
            const lightModeIcon = document.getElementById('lightModeIcon');

            function initializeTheme() {
                const savedTheme = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (savedTheme === 'light' || (!savedTheme && !prefersDark)) setLightMode(); else setDarkMode();
            }
            function setDarkMode() {
                document.body.classList.remove('light-mode');
                if (darkModeIcon) darkModeIcon.style.display = 'block';
                if (lightModeIcon) lightModeIcon.style.display = 'none';
                localStorage.setItem('theme', 'dark');
            }
            function setLightMode() {
                document.body.classList.add('light-mode');
                if (darkModeIcon) darkModeIcon.style.display = 'none';
                if (lightModeIcon) lightModeIcon.style.display = 'block';
                localStorage.setItem('theme', 'light');
            }
            if (themeToggle) themeToggle.addEventListener('click', () => document.body.classList.contains('light-mode') ? setDarkMode() : setLightMode());

            initializeTheme();

            // Main signature pad
            const responsableCanvas = document.getElementById('firma-responsable-pad');
            responsablePad = new SignaturePad(responsableCanvas);
            resizeCanvas(responsableCanvas, responsablePad);
            document.getElementById('clear-responsable').addEventListener('click', () => responsablePad.clear());

            const container = document.getElementById('attendees-container');
            const addAttendeeBtn = document.getElementById('add-attendee');

            function addAttendee() {
                const index = attendeeCounter++;
                const block = document.createElement('div');
                block.className = 'attendee-block';
                block.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Nombre y Apellido</label>
                            <input type="text" data-field="nombre" class="form-input">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Cargo</label>
                            <input type="text" data-field="cargo" class="form-input">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-1">Documento</label>
                            <input type="text" data-field="documento" class="form-input">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium mb-2">Firma</label>
                            <canvas class="signature-pad w-full h-48"></canvas>
                            <button type="button" onclick="clearAttendeePad(${index})" class="mt-2 text-sm text-blue-400 hover:text-blue-300">Limpiar Firma</button>
                        </div>
                    </div>
                `;
                container.appendChild(block);

                const canvas = block.querySelector('.signature-pad');
                const newPad = new SignaturePad(canvas);
                attendeePads[index] = newPad;
                resizeCanvas(canvas, newPad); // Resize the new canvas
            }

            window.addEventListener('resize', () => {
                resizeCanvas(responsableCanvas, responsablePad);
                attendeePads.forEach((pad, index) => {
                    const attendeeBlock = container.querySelectorAll('.attendee-block')[index];
                    if (attendeeBlock) {
                        const canvas = attendeeBlock.querySelector('.signature-pad');
                        resizeCanvas(canvas, pad);
                    }
                });
            });

            addAttendeeBtn.addEventListener('click', addAttendee);
            addAttendee(); // Add the first attendee by default

            // Form Submission
            const form = document.getElementById('capacitacionForm');
            form.addEventListener('submit', function (event) {
                if (!responsablePad.isEmpty()) {
                    document.getElementById('firma_responsable').value = responsablePad.toDataURL();
                }

                const attendeesData = [];
                const attendeeBlocks = container.querySelectorAll('.attendee-block');
                attendeeBlocks.forEach((block, index) => {
                    const pad = attendeePads[index];
                    const data = {
                        nombre: block.querySelector('[data-field="nombre"]').value,
                        cargo: block.querySelector('[data-field="cargo"]').value,
                        documento: block.querySelector('[data-field="documento"]').value,
                        firma: pad.isEmpty() ? '' : pad.toDataURL()
                    };
                    if (data.nombre || data.cargo || data.documento) {
                        attendeesData.push(data);
                    }
                });

                document.getElementById('lista_asistencia').value = JSON.stringify(attendeesData);
            });
        });

        function clearAttendeePad(index) {
            if (attendeePads[index]) {
                attendeePads[index].clear();
            }
        }

        function updateFileList() {
            const input = document.getElementById('capacitacion_files');
            const list = document.getElementById('fileList');
            if (!list) return;

            list.innerHTML = '';
            if (input && input.files.length > 0) {
                const ul = document.createElement('ul');
                ul.className = 'list-disc list-inside';
                for (let i = 0; i < input.files.length; i++) {
                    const li = document.createElement('li');
                    li.textContent = input.files[i].name;
                    ul.appendChild(li);
                }
                list.appendChild(ul);
            } else {
                list.textContent = 'No hay archivos seleccionados';
            }
        }
    </script>
</body>

</html>
