name: Mirror Source Repository

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          # Read the private key from your secret and save it to the runner
          echo "${{ secrets.SEKAPPSECRETO }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Scan GitHub's host keys to prevent SSH prompts
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Mirror Mirror on the Wall
        run: |
          git config --global user.name "Algeto99"
          git config --global user.email "alvaro.montalvo02@gmail.com"
          
          # 1. Clone using the clean SSH URL format
          git clone --mirror git@github.com:rcanton/sekapp.git sekapp.git
          
          cd sekapp.git
          
          # 2. Push to your destination backup repository using HTTPS authorization
          git push --mirror https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Algeto99/SEKapp-Backup.git
