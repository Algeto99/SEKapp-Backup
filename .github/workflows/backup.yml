name: Mirror Source Repository

on:
  schedule:
    # Runs every 6 hours (adjust cron as needed)
    - cron: '0 */24 * * *'
  workflow_dispatch: # Allows you to trigger it manually

# Grants the runner permission to push code into this backup repository
permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Mirror Mirror on the Wall
        run: |
          # Configure Git
          git config --global user.name "Backup Bot"
          git config --global user.email "backup-bot@example.com"
          
          # Clone the source repository as a bare mirror using your secret token
          git clone --mirror https://x-access-token:${{ secrets.SEKAPPSECRETO }}@github.com/rcanton/sekapp.git sekapp.git
          
          cd sekapp.git
          
          # Push everything (all branches, tags, and commits) to this backup repo
          # Uses the built-in GITHUB_TOKEN automatically provided by Actions for the local destination
          git push --mirror https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/https://github.com/Algeto99/SEKapp-Backup.git
