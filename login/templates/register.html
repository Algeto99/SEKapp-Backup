<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registrarse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #1a202c;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Merriweather', serif;
      color: #ffffff;
    }

    .register-card {
      background-color: #2d3748;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 500px; /* Adjusted max-width for more fields */
      width: 100%;
      padding: 2.5rem;
    }

    .form-input {
      @apply w-full px-5 py-3 border border-gray-600 rounded-lg shadow-sm
              bg-white text-gray-900 placeholder-gray-500
              focus:ring-blue-600 focus:border-blue-600 text-base;
    }

    .register-button {
      @apply w-full flex items-center justify-center py-4 px-8 text-lg font-medium rounded-lg
              transition-all duration-200 ease-in-out cursor-pointer shadow-xl
              hover:scale-105 bg-blue-600 text-white hover:bg-blue-700
              focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50;
    }

    .flash-message {
      @apply p-3 mb-4 rounded-lg text-sm font-medium;
    }

    .flash-success { @apply bg-green-500 text-white; }
    .flash-info { @apply bg-blue-500 text-white; }
    .flash-warning { @apply bg-yellow-500 text-gray-900; }
    .flash-danger { @apply bg-red-500 text-white; }
  </style>
</head>
<body>
  <div class="register-card text-center">
    <img src="https://storage.googleapis.com/smt-misc/SMT-logo.png" alt="SMT Logo" class="mx-auto mb-6 w-28 opacity-90" />

    <h1 class="text-3xl font-bold mb-6">Registrarse</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-message flash-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('register') }}" method="POST" class="space-y-6 text-left">
        <div>
          <label for="username" class="block text-sm font-medium mb-1">Nombre de Usuario:</label>
          <input type="text" id="username" name="username" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900" class="form-input" placeholder="Nombre del Usuario" />
        </div>

        <div>
            <label for="email" class="block text-sm font-medium mb-1">Correo Electrónico:</label>
            <input type="email" id="username" name="username" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900" class="form-input" placeholder="tu@ejemplo.com" />
        </div>
        
        <div>
            <label for="phone_number" class="block text-sm font-medium mb-1">Número de Teléfono (Opcional):</label>
            <input type="tel" id="phone_number" name="phone_number" class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900" class="form-input" placeholder="Ej: 123-456-7890" />
        </div>
    
        <div>
            <label for="password" class="block text-sm font-medium mb-1">Contraseña:</label>
            <input type="password" id="password" name="password" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900" class="form-input" placeholder="Tu contraseña" />
        </div>
      
        <div>
            <label for="confirm_password" class="block text-sm font-medium mb-1">Confirmar Contraseña:</label>
            <input type="password" id="confirm_password" name="confirm_password" required class="tom-select-searchable w-full px-4 py-2 border rounded-lg bg-white text-gray-900 dark:bg-gray-100 dark:text-gray-900" class="form-input" placeholder="Repite tu contraseña" />

        </div>
      
        <button type="submit" class="login-button w-full flex items-center justify-center py-4 px-8 text-lg font-medium rounded-lg transition-all duration-200 ease-in-out cursor-pointer shadow-xl hover:scale-105 bg-blue-600 text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">
          Registrarme
        </button>
    </form>

    <div class="mt-6 text-sm space-y-2 text-center">
      <a href="{{ url_for('login') }}" class="text-blue-400 hover:underline block">¿Ya tienes cuenta? Iniciar Sesión.</a>
    </div>
  </div>

  <script>
    document.querySelector('form').addEventListener('submit', function(event) {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirm_password').value;

        if (password !== confirmPassword) {
            alert('Las contraseñas no coinciden. Por favor, inténtalo de nuevo.');
            event.preventDefault(); // Prevent form submission
        }
    });
  </script>
</body>
</html>
