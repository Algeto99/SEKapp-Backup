<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #1a202c;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 1.5rem;
        }
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Merriweather', serif;
            color: #ffffff;
        }
        .register-card {
            background-color: #2d3748;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 420px;
            width: 100%;
            padding: 2rem;
        }
        .form-input {
            @apply block w-full px-4 py-2 border border-gray-600 rounded-lg shadow-sm
                   bg-gray-700 text-white placeholder-gray-400
                   focus:ring-blue-500 focus:border-blue-500 sm:text-sm;
        }
        .submit-button {
            @apply w-full py-3 px-6 bg-blue-600 text-white font-semibold rounded-lg shadow-md
                   hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75
                   transition duration-200 ease-in-out transform hover:scale-105;
        }
        .flash-message {
            @apply p-3 mb-4 rounded-lg text-sm font-medium;
        }
        .flash-success { @apply bg-green-500 text-white; }
        .flash-info { @apply bg-blue-500 text-white; }
        .flash-warning { @apply bg-yellow-500 text-gray-900; }
        .flash-danger { @apply bg-red-500 text-white; }
    </style>
</head>
<body>
    <div class="register-card">
        <!-- Logo -->
        <div class="flex justify-center mb-6">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" class="h-16">
        </div>

        <h1 class="text-3xl font-bold text-center mb-6">Registrarse</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash-message flash-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST" class="space-y-4">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-200 mb-1">Usuario (Email):</label>
                <input type="email" id="username" name="username" required value="{{ username if username else '' }}"
                       class="form-input" placeholder="tu@ejemplo.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-gray-200 mb-1">Contraseña:</label>
                <input type="password" id="password" name="password" required
                       class="form-input" placeholder="Elige una contraseña segura">
            </div>
            <div>
                <label for="confirm_password" class="block text-sm font-medium text-gray-200 mb-1">Confirmar Contraseña:</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       class="form-input" placeholder="Repite tu contraseña">
            </div>
            <button type="submit" class="submit-button">Registrarme</button>
        </form>

        <div class="mt-6 text-center text-sm">
            <a href="{{ url_for('login') }}" class="text-blue-400 hover:underline">¿Ya tienes cuenta? Iniciar Sesión.</a>
        </div>
    </div>
</body>
</html>
