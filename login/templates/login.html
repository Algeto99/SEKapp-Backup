<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #1a202c;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 1.5rem;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Merriweather', serif;
      color: #ffffff;
    }

    .login-card {
      background-color: #2d3748;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 500px;
      width: 100%;
      padding: 2.5rem;
    }

    /* Combined styles for form inputs */
    .form-input-combined {
        @apply w-full px-5 py-3 border border-gray-600 rounded-lg shadow-sm
               bg-white text-gray-900 placeholder-gray-500
               focus:ring-blue-600 focus:border-blue-600 text-base;
    }

    .login-button {
      @apply w-full py-3 px-6 bg-blue-600 text-white font-semibold rounded-lg shadow-xl
              hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75
              transition duration-200 ease-in-out transform hover:scale-105 text-lg;
    }

    .flash-message {
      @apply p-3 mb-4 rounded-lg text-sm font-medium;
    }

    .flash-success { @apply bg-green-500 text-white; }
    .flash-info    { @apply bg-blue-500 text-white; }
    .flash-warning { @apply bg-yellow-500 text-gray-900; }
    .flash-danger  { @apply bg-red-500 text-white; }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <img src="https://storage.googleapis.com/smt-misc/SMT-logo.png" alt="SMT Logo" class="mx-auto mb-6 w-28 opacity-90" />

    <h1 class="text-3xl font-bold mb-6">Iniciar Sesión</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash-message flash-{{ category }}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div id="js-alert-message" class="flash-message hidden"></div>

    <form id="login-form" class="space-y-6 text-left">
      <div>
        <label for="username" class="block text-sm font-medium mb-1">Usuario (Email):</label>
        <input type="email" id="username" name="username" required 
               class="form-input-combined" placeholder="tu@ejemplo.com" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium mb-1">Contraseña:</label>
        <input type="password" id="password" name="password" required 
               class="form-input-combined" placeholder="Tu contraseña" />
      </div>

      <button type="submit" class="login-button">
        Entrar
      </button>
    </form>

    <div class="mt-6 text-sm space-y-2 text-center">
      <a href="{{ url_for('register') }}" class="text-blue-400 hover:underline block">¿No tienes cuenta? Regístrate aquí.</a>
      <a href="#" class="text-blue-400 hover:underline block">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <script>
    // This URL will be provided by your Flask Login Service when it renders this template
    // For local development, you might default it.
    const LOGIN_SERVICE_URL = "{{ login_service_url | default('http://localhost:8080') }}";

    const loginForm = document.getElementById('login-form');
    const jsAlertMessage = document.getElementById('js-alert-message');

    // Function to display messages (either from Flask flashes or JS)
    function displayMessage(message, type = 'info') {
        jsAlertMessage.textContent = message;
        jsAlertMessage.className = `flash-message flash-${type}`; // Apply Tailwind classes
        jsAlertMessage.classList.remove('hidden');
        // Hide after some time if it's not an error that needs to persist
        if (type !== 'danger' && type !== 'error') {
            setTimeout(() => {
                jsAlertMessage.classList.add('hidden');
            }, 5000); // Hide after 5 seconds
        }
    }

    loginForm.addEventListener('submit', async function(event) {
        event.preventDefault(); // Stop the default form submission

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        // Hide any previous messages
        jsAlertMessage.classList.add('hidden');

        try {
            const response = await fetch(LOGIN_SERVICE_URL + '/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json' // Crucial: tell server we're sending JSON
                },
                body: JSON.stringify({ username: username, password: password }) // Send data as JSON
            });

            const data = await response.json(); // Parse the JSON response from the server

            if (response.ok) { // HTTP status is 200-299
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token); // Store refresh token

                displayMessage(data.message, 'success'); // Display success message
                
                // Redirect after a short delay to allow message to be seen
                setTimeout(() => {
                    window.location.href = data.landing_url; // Redirect to the landing page
                }, 1500); // 1.5 second delay
                
            } else {
                // Server returned an error (e.g., 401, 400, 500)
                const errorMessage = data.message || 'Error desconocido. Por favor, intente de nuevo.';
                displayMessage(`Fallo en el inicio de sesión: ${errorMessage}`, 'danger');
                console.error('Login error:', data);
            }
        } catch (error) {
            // Network error (e.g., server not reachable)
            console.error('Error de red o del servidor durante el inicio de sesión:', error);
            displayMessage('No se pudo conectar con el servidor. Por favor, verifique su conexión e intente de nuevo.', 'danger');
        }
    });
  </script>
</body>
</html>
